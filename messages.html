<!DOCTYPE html>
<html lang="fr">
<head>
<script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes messages — Erwan Amirault</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
<script src="https://assets.calendly.com/assets/external/widget.js" async></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            black: '#000000', white: '#FFFFFF',
            blue: { light: '#69A0F2', DEFAULT: '#2D7AED', dark: '#0F4CA9' }
          }
        },
        fontFamily: { heading: ['Oswald', 'sans-serif'], body: ['Poppins', 'sans-serif'] }
      }
    }
  }
</script>
<style>
  body { font-family: 'Poppins', sans-serif; }
  h1, h2, .font-heading { font-family: 'Oswald', sans-serif; }
</style>
</head>
<body class="min-h-screen">

  <header class="sticky top-0 z-50 bg-[color:var(--bg)] flex items-center justify-between px-6 sm:px-10 py-5 border-b border-[color:var(--border)]">
    <a href="index.html" class="flex items-center gap-2">
      <span class="font-heading uppercase font-bold text-sm tracking-wide">Erwan Amirault</span>
    </a>
    <div class="flex items-center gap-4 text-sm">
      <a href="index.html" class="text-[color:var(--fg-60)] hover:text-[color:var(--fg)] transition-colors">Accueil</a>
      <a href="dashboard.html" class="text-[color:var(--fg-60)] hover:text-[color:var(--fg)] transition-colors">Mon espace</a>
      <a href="formations.html" class="text-[color:var(--fg-60)] hover:text-[color:var(--fg)] transition-colors">Formations</a>
      <button id="theme-toggle" class="w-9 h-9 rounded-full border border-[color:var(--border-strong)] flex items-center justify-center hover:border-brand-blue transition-colors shrink-0"></button>
      <a href="a-propos.html" class="shrink-0"></a>
    </div>
  </header>

  <main id="page-content" class="px-6 py-8 max-w-lg mx-auto hidden">
    <h1 class="font-heading uppercase text-xl font-bold mb-1 text-center">💬 Mes messages</h1>
    <p class="text-xs text-[color:var(--fg-40)] text-center mb-6">Pose tes questions directement à ton coach.</p>

    <div id="messages-list" class="flex flex-col gap-3 mb-6 min-h-[200px]"></div>
    <p id="messages-empty" class="hidden text-center text-sm text-[color:var(--fg-40)] py-8">Aucun message pour l'instant — pose ta première question ci-dessous.</p>

    <div class="sticky bottom-0 bg-[color:var(--bg)] pt-3 pb-6 border-t border-[color:var(--border)]">
      <label class="block text-[10px] uppercase tracking-widest text-[color:var(--fg-40)] font-semibold mb-1.5">Catégorie</label>
      <select id="categorie-select" class="w-full mb-3 px-3 py-2 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
        <option value="">Choisis une catégorie</option>
        <option value="exercice">🏋️ Exercice</option>
        <option value="seance">📅 Séance</option>
        <option value="nutrition">🍽️ Nutrition</option>
        <option value="autre">💬 Autre</option>
      </select>
      <div class="flex items-end gap-2">
        <textarea id="message-input" rows="2" placeholder="Écris ta question ici..." class="flex-1 px-3 py-2 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue resize-none"></textarea>
        <button id="send-btn" class="shrink-0 px-5 py-2.5 rounded-lg bg-brand-blue hover:bg-brand-blue-dark transition-colors text-white font-heading uppercase text-xs font-semibold tracking-wide">
          Envoyer
        </button>
      </div>
    </div>
  </main>

  <div id="calendly-content" class="px-6 py-12 max-w-2xl mx-auto hidden"></div>

  <script src="supabase-config.js"></script>
  <script src="theme.js"></script>
  <script>
    const CALENDLY_URL = "https://calendly.com/erwan-amirault/30min";

    const CATEGORIE_LABELS = {
      exercice: '🏋️ Exercice',
      seance: '📅 Séance',
      nutrition: '🍽️ Nutrition',
      autre: '💬 Autre'
    };

    let currentUserEmail = null;
    let lastMessageCount = 0;
    let pollTimer = null;

    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function waitForCalendlyAndInit() {
      if (window.Calendly) {
        const widgetEl = document.getElementById('calendly-widget');
        if (widgetEl) widgetEl.style.height = window.innerWidth < 640 ? '1150px' : '750px';
        Calendly.initInlineWidget({ url: CALENDLY_URL, parentElement: document.querySelector('.calendly-inline-widget') });
      } else {
        setTimeout(waitForCalendlyAndInit, 200);
      }
    }

    function renderCalendlyBlock() {
      document.getElementById('page-content').classList.add('hidden');
      const el = document.getElementById('calendly-content');
      el.classList.remove('hidden');
      el.innerHTML = `
        <div class="text-center py-10">
          <span class="inline-block mb-6 px-4 py-1.5 rounded-full text-xs tracking-widest uppercase font-semibold border border-brand-blue-dark text-[color:var(--accent)]">
            Bilan de tes capacités
          </span>
          <h1 class="font-heading uppercase text-2xl sm:text-3xl font-bold mb-4">Pas encore de suivi actif</h1>
          <p class="text-[color:var(--fg-70)] text-sm sm:text-base leading-relaxed mb-10 max-w-sm mx-auto">
            La messagerie est réservée aux clients suivis. Réservons un appel pour faire le point ensemble sur tes objectifs.
          </p>
          <div class="rounded-2xl border border-brand-blue-dark bg-brand-blue/5 p-4 sm:p-6 max-w-lg mx-auto">
            <h2 class="font-heading uppercase text-lg font-bold mb-2">Appel bilan offert</h2>
            <p class="text-sm text-[color:var(--fg-60)] mb-4">30 minutes pour discuter de ta situation et voir comment on peut travailler ensemble.</p>
            <div class="calendly-inline-widget" data-url="${CALENDLY_URL}" style="width:100%;min-width:280px;height:700px;"></div>
          </div>
          <a href="dashboard.html" class="inline-block mt-10 text-sm text-[color:var(--fg-50)] hover:text-[color:var(--fg)] transition-colors underline underline-offset-4">
            Retour à mon espace
          </a>
        </div>
      `;
      waitForCalendlyAndInit();
    }

    function renderMessages(messages) {
      const list = document.getElementById('messages-list');
      const emptyMsg = document.getElementById('messages-empty');

      if (!messages || messages.length === 0) {
        list.innerHTML = '';
        emptyMsg.classList.remove('hidden');
        return;
      }
      emptyMsg.classList.add('hidden');

      list.innerHTML = messages.map(m => {
        const isMine = m.sender === 'client';
        const catLabel = m.categorie ? CATEGORIE_LABELS[m.categorie] : null;
        const time = new Date(m.created_at).toLocaleString('fr-FR', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });

        return `
          <div class="flex ${isMine ? 'justify-end' : 'justify-start'}">
            <div class="max-w-[80%] rounded-2xl px-4 py-2.5 ${isMine ? 'bg-brand-blue text-white' : 'bg-[color:var(--card)] text-[color:var(--fg)]'}">
              ${catLabel ? `<p class="text-[10px] uppercase tracking-widest opacity-70 mb-1">${catLabel}</p>` : ''}
              <p class="text-sm leading-relaxed whitespace-pre-wrap">${escapeHtml(m.contenu)}</p>
              <p class="text-[10px] mt-1 ${isMine ? 'text-white/60' : 'text-[color:var(--fg-40)]'}">${time}</p>
            </div>
          </div>
        `;
      }).join('');

      list.scrollTop = list.scrollHeight;
    }

    async function loadMessages(silent) {
      const { data } = await supabaseClient
        .from('messages')
        .select('*')
        .eq('client_email', currentUserEmail)
        .order('created_at', { ascending: true });

      const messages = data || [];
      if (silent && messages.length === lastMessageCount) return;
      lastMessageCount = messages.length;
      renderMessages(messages);
    }

    async function sendMessage() {
      const input = document.getElementById('message-input');
      const catSelect = document.getElementById('categorie-select');
      const contenu = input.value.trim();
      if (!contenu) return;

      if (!catSelect.value) {
        alert("Choisis une catégorie pour ton message.");
        return;
      }

      const btn = document.getElementById('send-btn');
      btn.disabled = true;

      const { error } = await supabaseClient.from('messages').insert({
        client_email: currentUserEmail,
        categorie: catSelect.value,
        sender: 'client',
        contenu: contenu
      });

      btn.disabled = false;

      if (error) { alert("Erreur : " + error.message); return; }

      input.value = '';
      catSelect.value = '';
      await loadMessages(false);
    }

    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('message-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    async function load() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) { window.location.href = 'login.html'; return; }
      currentUserEmail = user.email.trim().toLowerCase();

      const { data: clientActif } = await supabaseClient
        .from('clients_actifs')
        .select('email')
        .ilike('email', currentUserEmail)
        .maybeSingle();

      if (!clientActif) { renderCalendlyBlock(); return; }

      document.getElementById('page-content').classList.remove('hidden');
      await loadMessages(false);

      pollTimer = setInterval(() => loadMessages(true), 15000);
    }

    load();
  </script>

</body>
</html>
