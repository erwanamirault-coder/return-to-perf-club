<!DOCTYPE html>
<html lang="fr">
<head>
<script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes formations — Erwan Amirault</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            black: '#000000', white: '#FFFFFF',
            blue: { light: '#69A0F2', DEFAULT: '#2D7AED', dark: '#0F4CA9' }
          }
        },
        fontFamily: { heading: ['Oswald', 'sans-serif'], body: ['Poppins', 'sans-serif'] }
      }
    }
  }
</script>
<style>
  body { font-family: 'Poppins', sans-serif; }
  h1, h2, .font-heading { font-family: 'Oswald', sans-serif; }
</style>
</head>
<body class="min-h-screen">

  <header class="sticky top-0 z-50 bg-[color:var(--bg)] flex items-center justify-between px-6 sm:px-10 py-5 border-b border-[color:var(--border)]">
    <a href="index.html" class="flex items-center gap-2">
      <span class="font-heading uppercase font-bold text-sm tracking-wide">Erwan Amirault</span>
    </a>
    <div class="flex items-center gap-4 text-sm">
      <a href="dashboard.html" class="text-[color:var(--fg-60)] hover:text-[color:var(--fg)] transition-colors">Mon espace</a>
      <a href="formations.html" class="text-[color:var(--fg-60)] hover:text-[color:var(--fg)] transition-colors">Catalogue</a>
      <button id="theme-toggle" class="w-9 h-9 rounded-full border border-[color:var(--border-strong)] flex items-center justify-center hover:border-brand-blue transition-colors shrink-0"></button>
    </div>
  </header>

  <main class="px-6 py-14 max-w-3xl mx-auto">
    <h1 class="font-heading uppercase text-2xl sm:text-3xl font-bold mb-2 text-center">Mes formations</h1>
    <p class="text-sm text-[color:var(--fg-50)] text-center mb-10">Retrouve ici les formations que tu as achetées.</p>

    <div id="formations-list" class="grid sm:grid-cols-2 gap-5"></div>
    <p id="empty-state" class="hidden text-center text-sm text-[color:var(--fg-50)] py-16">
      Tu n'as pas encore de formation. <a href="formations.html" class="text-brand-blue underline">Découvre le catalogue →</a>
    </p>
  </main>

  <script src="supabase-config.js"></script>
  <script src="theme.js"></script>
  <script>
    const supabaseClient2 = supabaseClient; // alias, cohérent avec le reste du site

    async function load() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) { window.location.href = 'login.html'; return; }

      const { data: achats, error } = await supabaseClient
        .from('achats_formations')
        .select('formation_id, formations (id, titre, accroche, image_url, niveau)')
        .eq('user_id', user.id)
        .eq('statut', 'paye');

      const list = document.getElementById('formations-list');
      const empty = document.getElementById('empty-state');

      if (error || !achats || achats.length === 0) {
        empty.classList.remove('hidden');
        return;
      }

      list.innerHTML = '';
      achats.forEach(a => {
        const f = a.formations;
        if (!f) return;
        const card = document.createElement('a');
        card.href = `formation-access.html?id=${f.id}`;
        card.className = 'block rounded-2xl overflow-hidden bg-[color:var(--card)] border border-[color:var(--border)] hover:border-brand-blue transition-colors';
        card.innerHTML = `
          <div class="h-32 flex items-center justify-center" style="background:linear-gradient(135deg,#0F4CA9,#2D7AED,#69A0F2);">
            ${f.image_url
              ? `<img src="${f.image_url}" alt="${f.titre}" class="w-full h-full object-cover">`
              : `<span class="font-heading text-white/90 text-xs uppercase tracking-widest">Return To Perf</span>`
            }
          </div>
          <div class="p-5">
            <p class="text-brand-blue text-xs font-semibold uppercase tracking-wider mb-1">${f.niveau || ''}</p>
            <h3 class="font-heading uppercase text-lg font-bold mb-3">${f.titre}</h3>
            <span class="text-sm font-semibold text-brand-blue">Accéder à la formation →</span>
          </div>
        `;
        list.appendChild(card);
      });
    }

    load();
  </script>

</body>
</html>
