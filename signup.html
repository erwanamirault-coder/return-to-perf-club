<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer mon compte — Bilan de tes capacités</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            black: '#000000', white: '#FFFFFF',
            blue: { light: '#69A0F2', DEFAULT: '#2D7AED', dark: '#0F4CA9' }
          }
        },
        fontFamily: { heading: ['Oswald', 'sans-serif'], body: ['Poppins', 'sans-serif'] }
      }
    }
  }
</script>
<style>
  body { font-family: 'Poppins', sans-serif; }
  h1, .font-heading { font-family: 'Oswald', sans-serif; }
</style>
</head>
<body class="bg-brand-black text-brand-white min-h-screen flex flex-col items-center justify-center px-6">

  <div class="w-full max-w-sm">

    <div class="flex justify-center mb-8">
      <svg width="48" height="48" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" stroke="#2D7AED" stroke-width="3"/>
        <path d="M20 40L32 20L44 40" stroke="#69A0F2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1 class="font-heading uppercase text-2xl font-bold text-center mb-8">Créer un compte</h1>

    <form id="signup-form" class="flex flex-col gap-4">
      <input type="text" id="fullname" placeholder="Prénom" required
        class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 focus:border-brand-blue outline-none placeholder:text-white/40">
      <input type="email" id="email" placeholder="Adresse email" required
        class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 focus:border-brand-blue outline-none placeholder:text-white/40">
      <input type="password" id="password" placeholder="Mot de passe" required minlength="6"
        class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 focus:border-brand-blue outline-none placeholder:text-white/40">

      <p id="error-msg" class="text-red-400 text-sm hidden"></p>

      <button type="submit" id="submit-btn"
        class="mt-2 w-full px-10 py-4 rounded-lg bg-brand-blue hover:bg-brand-blue-dark transition-colors font-heading uppercase tracking-wide font-semibold">
        Créer mon compte
      </button>
    </form>

    <p class="text-center text-sm text-white/60 mt-6">
      Déjà un compte ? <a href="login.html" class="text-brand-blue-light underline underline-offset-4">Se connecter</a>
    </p>
  </div>

  <script src="supabase-config.js"></script>
  <script>
    const form = document.getElementById('signup-form');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Création...';

      const fullname = document.getElementById('fullname').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: { data: { full_name: fullname } }
      });

      if (error) {
        errorMsg.textContent = error.message;
        errorMsg.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Créer mon compte';
        return;
      }

      // Redirige vers le questionnaire
      window.location.href = 'questionnaire.html';
    });
  </script>

</body>
</html>
