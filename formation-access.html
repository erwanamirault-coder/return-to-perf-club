<!DOCTYPE html>
<html lang="fr">
<head>
<script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accès formation — Erwan Amirault</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            black: '#000000', white: '#FFFFFF',
            blue: { light: '#69A0F2', DEFAULT: '#2D7AED', dark: '#0F4CA9' }
          }
        },
        fontFamily: { heading: ['Oswald', 'sans-serif'], body: ['Poppins', 'sans-serif'] }
      }
    }
  }
</script>
<style>
  body { font-family: 'Poppins', sans-serif; }
  h1, h2, .font-heading { font-family: 'Oswald', sans-serif; }
  video { background: black; }
</style>
</head>
<body class="min-h-screen">

  <header class="sticky top-0 z-50 bg-[color:var(--bg)] flex items-center justify-between px-6 sm:px-10 py-5 border-b border-[color:var(--border)]">
    <a href="index.html" class="flex items-center gap-2">
      <span class="font-heading uppercase font-bold text-sm tracking-wide">Erwan Amirault</span>
    </a>
    <div class="flex items-center gap-4 text-sm">
      <a href="mes-formations.html" class="text-[color:var(--fg-60)] hover:text-[color:var(--fg)] transition-colors">← Mes formations</a>
      <button id="theme-toggle" class="w-9 h-9 rounded-full border border-[color:var(--border-strong)] flex items-center justify-center hover:border-brand-blue transition-colors shrink-0"></button>
    </div>
  </header>

  <main class="px-6 py-12 max-w-2xl mx-auto" id="content">
    <p class="text-center text-sm text-[color:var(--fg-50)]">Chargement...</p>
  </main>

  <script src="supabase-config.js"></script>
  <script src="theme.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const formationId = params.get('id');
    const content = document.getElementById('content');

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function load() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }

      // Vérifier l'achat
      const { data: achat } = await supabaseClient
        .from('achats_formations')
        .select('id')
        .eq('user_id', session.user.id)
        .eq('formation_id', formationId)
        .eq('statut', 'paye')
        .maybeSingle();

      if (!achat) {
        content.innerHTML = `
          <div class="text-center py-16">
            <p class="text-[color:var(--fg-60)] mb-6">Tu n'as pas accès à cette formation.</p>
            <a href="formations.html" class="inline-block px-6 py-3 rounded-lg bg-brand-blue text-white font-heading uppercase text-sm font-semibold hover:bg-brand-blue-dark transition-colors">
              Voir le catalogue
            </a>
          </div>
        `;
        return;
      }

      // Récupérer les infos de la formation + son contenu
      const { data: formation } = await supabaseClient
        .from('formations')
        .select('titre, description')
        .eq('id', formationId)
        .single();

      const { data: lecons } = await supabaseClient
        .from('formation_contenu')
        .select('*')
        .eq('formation_id', formationId)
        .order('ordre', { ascending: true });

      document.title = (formation?.titre || 'Formation') + ' | Erwan Amirault';

      if (!lecons || lecons.length === 0) {
        content.innerHTML = `
          <h1 class="font-heading uppercase text-2xl font-bold mb-6 text-center">${escapeHtml(formation?.titre)}</h1>
          <p class="text-center text-sm text-[color:var(--fg-50)] py-12">
            Le contenu de cette formation arrive très bientôt. Reviens un peu plus tard !
          </p>
        `;
        return;
      }

      content.innerHTML = `
        <h1 class="font-heading uppercase text-2xl font-bold mb-8 text-center">${escapeHtml(formation?.titre)}</h1>
        <div id="lecons-list" class="flex flex-col gap-4"></div>
      `;

      const lessonsList = document.getElementById('lecons-list');

      lecons.forEach((lecon, i) => {
        const card = document.createElement('div');
        card.className = 'rounded-xl border border-[color:var(--border)] p-5';
        card.innerHTML = `
          <div class="flex items-center justify-between mb-3">
            <p class="font-heading font-bold">
              <span class="text-[color:var(--fg-40)] mr-2">${String(i + 1).padStart(2, '0')}</span>
              ${escapeHtml(lecon.titre)}
            </p>
            <span class="text-xs uppercase tracking-wide text-[color:var(--fg-50)]">${lecon.type === 'video' ? '🎥 Vidéo' : '📄 PDF'}</span>
          </div>
          <div class="lecon-body" data-id="${lecon.id}" data-type="${lecon.type}">
            <button class="load-lecon-btn text-sm px-4 py-2 rounded-lg bg-brand-blue text-white font-medium hover:bg-brand-blue-dark transition-colors" data-id="${lecon.id}" data-type="${lecon.type}">
              ${lecon.type === 'video' ? 'Regarder la vidéo' : 'Télécharger le PDF'}
            </button>
          </div>
        `;
        lessonsList.appendChild(card);
      });

      document.querySelectorAll('.load-lecon-btn').forEach(btn => {
        btn.addEventListener('click', () => loadLecon(btn));
      });
    }

    async function loadLecon(btn) {
      const contentId = btn.dataset.id;
      const type = btn.dataset.type;
      const wrapper = btn.parentElement;

      btn.disabled = true;
      btn.textContent = 'Chargement...';

      const { data: { session } } = await supabaseClient.auth.getSession();

      try {
        const res = await fetch('/api/get-signed-url', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${session.access_token}`,
          },
          body: JSON.stringify({ contentId }),
        });
        const data = await res.json();
        if (!res.ok || !data.url) throw new Error(data.error || 'Erreur');

        if (type === 'video') {
          wrapper.innerHTML = `<video src="${data.url}" controls class="w-full rounded-lg" style="max-height:400px;"></video>`;
        } else {
          window.open(data.url, '_blank');
          btn.disabled = false;
          btn.textContent = 'Télécharger le PDF';
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Erreur, réessaie';
      }
    }

    load();
  </script>

</body>
</html>
