<!DOCTYPE html>
<html lang="fr">
<head>
<script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Mes services</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: { blue: { light: '#69A0F2', DEFAULT: '#2D7AED', dark: '#0F4CA9' } }
        },
        fontFamily: { heading: ['Oswald', 'sans-serif'], body: ['Poppins', 'sans-serif'] }
      }
    }
  }
</script>
<style>
  body { font-family: 'Poppins', sans-serif; }
  h1, h2, .font-heading { font-family: 'Oswald', sans-serif; }
</style>
</head>
<body class="min-h-screen">

  <header class="sticky top-0 z-50 bg-[color:var(--bg)] flex items-center justify-between px-6 sm:px-10 py-5 border-b border-[color:var(--border)]">
    <a href="admin.html" class="text-sm text-[color:var(--fg-60)] hover:text-[color:var(--fg)] transition-colors">← Retour admin</a>
    <h1 class="font-heading uppercase text-sm font-bold">Mes services</h1>
    <a href="mes-services.html" target="_blank" class="text-sm text-brand-blue hover:underline">Voir la page →</a>
  </header>

  <p id="denied" class="hidden text-center py-20 text-[color:var(--fg-50)]">Accès réservé.</p>

  <div id="main-content" class="hidden px-6 py-10 max-w-2xl mx-auto">

    <div class="flex items-center justify-between mb-6">
      <p class="text-sm text-[color:var(--fg-50)]">Gère les cartes affichées sur la page "Mes services".</p>
      <button type="button" id="new-offre-btn" class="px-4 py-2 rounded-lg bg-brand-blue hover:bg-brand-blue-dark transition-colors text-white text-xs font-heading uppercase tracking-wide font-semibold shrink-0">
        + Nouvelle offre
      </button>
    </div>

    <div id="offres-list" class="flex flex-col gap-3"></div>

  </div>

  <!-- Panneau d'édition -->
  <div id="edit-panel" class="hidden fixed inset-0 z-50 bg-black/50 flex items-start sm:items-center justify-center p-4 overflow-y-auto">
    <div class="bg-[color:var(--bg)] rounded-2xl border border-[color:var(--border)] max-w-lg w-full p-6 my-8">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-heading uppercase text-lg font-bold">Modifier l'offre</h2>
        <button type="button" id="close-panel-btn" class="text-[color:var(--fg-50)] hover:text-[color:var(--fg)]">✕</button>
      </div>

      <form id="offre-form" class="flex flex-col gap-3">
        <input type="hidden" id="f-id">

        <div>
          <label class="block text-xs font-semibold text-[color:var(--fg-60)] mb-1.5">Type de carte</label>
          <select id="f-type" class="w-full px-3 py-2.5 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
            <option value="phare">⭐ Offre phare (grande carte bleue mise en avant)</option>
            <option value="standard">Offre standard (carte classique)</option>
            <option value="bientot">Bientôt disponible (grisée, sans bouton)</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold text-[color:var(--fg-60)] mb-1.5">Badge (optionnel)</label>
          <input type="text" id="f-badge" placeholder="Ex: Le plus complet" class="w-full px-3 py-2.5 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
        </div>

        <div>
          <label class="block text-xs font-semibold text-[color:var(--fg-60)] mb-1.5">Titre</label>
          <input type="text" id="f-titre" required class="w-full px-3 py-2.5 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
        </div>

        <div>
          <label class="block text-xs font-semibold text-[color:var(--fg-60)] mb-1.5">Description</label>
          <textarea id="f-description" rows="4" class="w-full px-3 py-2.5 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue"></textarea>
        </div>

        <div>
          <label class="block text-xs font-semibold text-[color:var(--fg-60)] mb-1.5">Points / bénéfices — un par ligne</label>
          <textarea id="f-points" rows="5" placeholder="✅ Premier point&#10;✅ Deuxième point&#10;🔎 Détail inclus" class="w-full px-3 py-2.5 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-[color:var(--fg-60)] mb-1.5">Texte du bouton</label>
            <input type="text" id="f-bouton-texte" class="w-full px-3 py-2.5 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
          </div>
          <div>
            <label class="block text-xs font-semibold text-[color:var(--fg-60)] mb-1.5">Lien du bouton</label>
            <input type="text" id="f-bouton-lien" placeholder="https://..." class="w-full px-3 py-2.5 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-[color:var(--fg-60)] mb-1.5">Ordre d'affichage</label>
          <input type="number" id="f-ordre" class="w-32 px-3 py-2.5 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
        </div>

        <label class="flex items-center gap-2 mt-1">
          <input type="checkbox" id="f-actif" class="w-4 h-4">
          <span class="text-sm">Visible sur le site</span>
        </label>

        <p id="form-error" class="hidden text-xs text-red-500"></p>

        <div class="flex items-center gap-3 mt-2">
          <button type="submit" id="save-offre-btn" class="px-6 py-3 rounded-lg bg-brand-blue hover:bg-brand-blue-dark transition-colors text-white font-heading uppercase tracking-wide font-semibold text-sm">
            Enregistrer
          </button>
          <button type="button" id="delete-offre-btn" class="px-4 py-3 rounded-lg border border-red-300 text-red-500 hover:bg-red-500/10 transition-colors text-xs font-semibold">
            Supprimer cette offre
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="supabase-config.js"></script>
  <script src="theme.js"></script>
  <script>
    const ADMIN_EMAIL = "erwan20b@gmail.com";
    let offres = [];

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    const typeLabels = { phare: '⭐ Phare', standard: 'Standard', bientot: 'Bientôt dispo' };

    async function loadOffres() {
      const { data, error } = await supabaseClient.from('offres_services').select('*').order('ordre', { ascending: true });
      const list = document.getElementById('offres-list');

      if (error) {
        list.innerHTML = `<p class="text-sm text-red-500">Erreur : ${error.message}</p>`;
        return;
      }

      offres = data || [];

      if (offres.length === 0) {
        list.innerHTML = `<p class="text-sm text-[color:var(--fg-50)]">Aucune offre pour l'instant.</p>`;
        return;
      }

      list.innerHTML = offres.map(o => `
        <div class="rounded-xl border ${o.actif ? 'border-[color:var(--border)]' : 'border-dashed border-[color:var(--border)] opacity-50'} p-4 flex items-center justify-between gap-3 flex-wrap">
          <div>
            <p class="text-[10px] uppercase tracking-widest font-semibold text-brand-blue mb-1">${typeLabels[o.type] || o.type} · ordre ${o.ordre}</p>
            <p class="font-heading font-bold text-sm">${escapeHtml(o.titre)} ${o.actif ? '' : '<span class="text-[10px] font-normal text-[color:var(--fg-50)]">(masquée)</span>'}</p>
          </div>
          <div class="flex items-center gap-2">
            <button type="button" data-id="${o.id}" data-actif="${o.actif}" class="toggle-btn text-xs px-2.5 py-1 rounded-md ${o.actif ? 'bg-brand-blue text-white' : 'bg-[color:var(--card)] text-[color:var(--fg-40)]'}">
              ${o.actif ? 'Actif' : 'Inactif'}
            </button>
            <button type="button" data-id="${o.id}" class="edit-btn text-xs px-2.5 py-1 rounded-md border border-[color:var(--border)] hover:bg-black/5 dark:hover:bg-white/5 transition-colors">Modifier</button>
          </div>
        </div>
      `).join('');

      list.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const nowActif = btn.dataset.actif !== 'true';
          await supabaseClient.from('offres_services').update({ actif: nowActif }).eq('id', btn.dataset.id);
          loadOffres();
        });
      });

      list.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => openEditPanel(offres.find(o => String(o.id) === btn.dataset.id)));
      });
    }

    function openEditPanel(offre) {
      document.getElementById('form-error').classList.add('hidden');
      if (offre) {
        document.getElementById('f-id').value = offre.id;
        document.getElementById('f-type').value = offre.type;
        document.getElementById('f-badge').value = offre.badge || '';
        document.getElementById('f-titre').value = offre.titre;
        document.getElementById('f-description').value = offre.description || '';
        document.getElementById('f-points').value = offre.points || '';
        document.getElementById('f-bouton-texte').value = offre.bouton_texte || '';
        document.getElementById('f-bouton-lien').value = offre.bouton_lien || '';
        document.getElementById('f-ordre').value = offre.ordre;
        document.getElementById('f-actif').checked = offre.actif;
        document.getElementById('delete-offre-btn').classList.remove('hidden');
      } else {
        document.getElementById('f-id').value = '';
        document.getElementById('f-type').value = 'standard';
        document.getElementById('f-badge').value = '';
        document.getElementById('f-titre').value = '';
        document.getElementById('f-description').value = '';
        document.getElementById('f-points').value = '';
        document.getElementById('f-bouton-texte').value = '';
        document.getElementById('f-bouton-lien').value = '';
        document.getElementById('f-ordre').value = offres.length + 1;
        document.getElementById('f-actif').checked = true;
        document.getElementById('delete-offre-btn').classList.add('hidden');
      }
      document.getElementById('edit-panel').classList.remove('hidden');
    }

    document.getElementById('new-offre-btn').addEventListener('click', () => openEditPanel(null));
    document.getElementById('close-panel-btn').addEventListener('click', () => document.getElementById('edit-panel').classList.add('hidden'));

    document.getElementById('offre-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('form-error');
      errorEl.classList.add('hidden');

      const id = document.getElementById('f-id').value;
      const payload = {
        type: document.getElementById('f-type').value,
        badge: document.getElementById('f-badge').value.trim() || null,
        titre: document.getElementById('f-titre').value.trim(),
        description: document.getElementById('f-description').value.trim(),
        points: document.getElementById('f-points').value.trim(),
        bouton_texte: document.getElementById('f-bouton-texte').value.trim() || null,
        bouton_lien: document.getElementById('f-bouton-lien').value.trim() || null,
        ordre: Number(document.getElementById('f-ordre').value) || 0,
        actif: document.getElementById('f-actif').checked,
      };

      const query = id
        ? supabaseClient.from('offres_services').update(payload).eq('id', id)
        : supabaseClient.from('offres_services').insert(payload);

      const { error } = await query;
      if (error) {
        errorEl.textContent = "Erreur : " + error.message;
        errorEl.classList.remove('hidden');
        return;
      }

      document.getElementById('edit-panel').classList.add('hidden');
      loadOffres();
    });

    document.getElementById('delete-offre-btn').addEventListener('click', async () => {
      const id = document.getElementById('f-id').value;
      if (!id || !confirm('Supprimer définitivement cette offre ?')) return;
      await supabaseClient.from('offres_services').delete().eq('id', id);
      document.getElementById('edit-panel').classList.add('hidden');
      loadOffres();
    });

    async function checkAccess() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user || user.email !== ADMIN_EMAIL) {
        document.getElementById('denied').classList.remove('hidden');
        return;
      }
      document.getElementById('main-content').classList.remove('hidden');
      loadOffres();
    }

    checkAccess();
  </script>

</body>
</html>
