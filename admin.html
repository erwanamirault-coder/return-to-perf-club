<!DOCTYPE html>
<html lang="fr">
<head>
<script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Gérer les séances</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            black: '#000000', white: '#FFFFFF',
            blue: { light: '#69A0F2', DEFAULT: '#2D7AED', dark: '#0F4CA9' }
          }
        },
        fontFamily: { heading: ['Oswald', 'sans-serif'], body: ['Poppins', 'sans-serif'] }
      }
    }
  }
</script>
<style>
  body { font-family: 'Poppins', sans-serif; }
  h1, h2, .font-heading { font-family: 'Oswald', sans-serif; }
</style>
</head>
<body class="min-h-screen">

  <header class="flex items-center justify-between px-6 sm:px-10 py-5 border-b border-[color:var(--border)]">
    <span class="font-heading uppercase font-bold text-sm tracking-wide">Admin — Bilan de tes capacités</span>
    <div class="flex items-center gap-4 text-sm">
      <a href="dashboard.html" class="text-[color:var(--fg-60)] hover:text-[color:var(--fg)] transition-colors">Mon espace</a>
      <button id="theme-toggle" class="w-9 h-9 rounded-full border border-[color:var(--border-strong)] flex items-center justify-center hover:border-brand-blue transition-colors shrink-0"></button>
    </div>
  </header>

  <main id="main-content" class="px-6 py-10 max-w-3xl mx-auto hidden">
    <h1 class="font-heading uppercase text-2xl font-bold mb-6 text-center">Gérer les séances</h1>

    <div id="client-tabs" class="flex flex-wrap gap-2 mb-8"></div>

    <div id="add-client-form" class="hidden rounded-xl border border-[color:var(--border)] p-4 mb-8">
      <p class="text-xs uppercase tracking-widest text-[color:var(--fg-50)] font-semibold mb-3">Ajouter un client en suivi</p>
      <div class="grid sm:grid-cols-3 gap-2">
        <input type="email" id="new-client-email" placeholder="Email du client" class="px-3 py-2 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue sm:col-span-1">
        <input type="text" id="new-client-nom" placeholder="Prénom (optionnel)" class="px-3 py-2 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue sm:col-span-1">
        <button id="confirm-add-client" class="px-4 py-2 rounded-lg bg-brand-blue hover:bg-brand-blue-dark transition-colors text-white text-sm font-medium">Ajouter</button>
      </div>
    </div>

    <div id="client-workspace" class="hidden">
      <div class="flex items-center justify-between mb-6">
        <p id="selected-client-label" class="text-sm text-[color:var(--fg-60)]"></p>
        <button id="remove-client-btn" class="text-xs text-red-400 hover:text-red-300">Retirer ce client du suivi</button>
      </div>

      <div class="flex gap-2 mb-8 border-b border-[color:var(--border)]">
        <button id="tab-programmation" class="section-tab px-4 py-2.5 text-sm font-medium border-b-2 border-brand-blue text-[color:var(--accent)]">Programmation</button>
        <button id="tab-records" class="section-tab px-4 py-2.5 text-sm font-medium border-b-2 border-transparent text-[color:var(--fg-50)] hover:text-[color:var(--fg)]">Records (PR)</button>
      </div>

      <!-- SECTION PROGRAMMATION -->
      <div id="section-programmation">
        <div class="flex items-center justify-between mb-2">
          <button id="prev-week-btn" class="w-8 h-8 rounded-full border border-[color:var(--border-strong)] flex items-center justify-center hover:border-brand-blue transition-colors text-sm">‹</button>
          <input type="date" id="week-picker"
            class="px-4 py-2 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] focus:border-brand-blue outline-none text-sm">
          <button id="next-week-btn" class="w-8 h-8 rounded-full border border-[color:var(--border-strong)] flex items-center justify-center hover:border-brand-blue transition-colors text-sm">›</button>
        </div>

        <p id="week-info" class="text-sm text-[color:var(--fg-50)] mb-4 text-center"></p>

        <div class="flex justify-center mb-8">
          <button id="duplicate-week-btn" class="text-sm px-4 py-2 rounded-lg border border-brand-blue-dark text-[color:var(--accent)] hover:bg-brand-blue/5 transition-colors font-medium">
            📋 Dupliquer cette semaine → semaine suivante
          </button>
        </div>

        <p class="text-xs text-[color:var(--fg-40)] mb-6 text-center">💡 Clique sur un exercice déjà ajouté ci-dessous pour le modifier.</p>

        <div id="days-container" class="flex flex-col gap-4"></div>
      </div>

      <!-- SECTION RECORDS (identique au client) -->
      <div id="section-records" class="hidden">
        <p class="text-sm text-[color:var(--fg-50)] text-center mb-6">Tape ✎ pour saisir rapidement une valeur, ou clique sur le mouvement pour voir l'évolution complète du client.</p>
        <div id="category-tabs" class="flex flex-wrap gap-2 justify-center mb-8"></div>
        <div id="movement-list" class="flex flex-col gap-0 rounded-xl border border-[color:var(--border)] overflow-hidden divide-y divide-[color:var(--border)]"></div>
      </div>

    </div>
  </main>

  <p id="denied" class="hidden text-center py-20 text-[color:var(--fg-50)]">Accès réservé.</p>

  <script src="supabase-config.js"></script>
  <script src="theme.js"></script>
  <script>
    const ADMIN_EMAIL = "erwan20b@gmail.com";
    const jours = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];

    const mouvements = {
      "Haltérophilie / Weightlifting": [
        { fr: "Arraché", en: "Snatch" }, { fr: "Arraché suspendu", en: "Hang Snatch" },
        { fr: "Arraché puissance", en: "Power Snatch" }, { fr: "Arraché puissance suspendu", en: "Hang Power Snatch" },
        { fr: "Tirage d'arraché", en: "Snatch Pull" }, { fr: "Épaulé", en: "Clean" },
        { fr: "Épaulé suspendu", en: "Hang Clean" }, { fr: "Épaulé puissance", en: "Power Clean" },
        { fr: "Épaulé puissance suspendu", en: "Hang Power Clean" }, { fr: "Tirage d'épaulé", en: "Clean Pull" },
        { fr: "Jeté", en: "Jerk" }, { fr: "Jeté fente", en: "Split Jerk" }, { fr: "Jeté puissance", en: "Power Jerk" },
        { fr: "Poussée-jeté", en: "Push Jerk" }, { fr: "Épaulé-jeté", en: "Clean & Jerk" },
        { fr: "Squat clavicule", en: "Front Squat" }, { fr: "Squat nuque", en: "Back Squat" }, { fr: "Squat overhead", en: "Overhead Squat" }
      ],
      "Renforcement": [
        { fr: "Squat arrière", en: "Back Squat" }, { fr: "Squat avant", en: "Front Squat" }, { fr: "Squat overhead", en: "Overhead Squat" },
        { fr: "Soulevé de terre", en: "Deadlift" }, { fr: "Soulevé de terre sumo", en: "Sumo Deadlift" },
        { fr: "Développé couché", en: "Bench Press" }, { fr: "Développé militaire strict", en: "Strict Press" },
        { fr: "Développé militaire poussé", en: "Push Press" }, { fr: "Thruster", en: "Thruster" },
        { fr: "Good Morning", en: "Good Morning" }, { fr: "Fentes bulgares", en: "Bulgarian Split Squat" }
      ],
      "Gymnastique": [
        { fr: "Traction stricte", en: "Strict Pull-up" }, { fr: "Traction kipping", en: "Kipping Pull-up" },
        { fr: "Traction papillon", en: "Butterfly Pull-up" }, { fr: "Traction poitrine à la barre", en: "Chest to Bar" },
        { fr: "Muscle-up barre", en: "Bar Muscle-up" }, { fr: "Muscle-up anneaux", en: "Ring Muscle-up" },
        { fr: "Relevé de jambes à la barre", en: "Toes to Bar" }, { fr: "Pompe poirier", en: "Handstand Push-up" },
        { fr: "Marche sur les mains", en: "Handstand Walk" }, { fr: "Poirier (tenue)", en: "Handstand Hold" },
        { fr: "Grimper de corde", en: "Rope Climb" }, { fr: "Squat pistol", en: "Pistol Squat" }, { fr: "Dips aux anneaux", en: "Ring Dips" }
      ],
      "Cardio / Benchmarks": [
        { fr: "Rameur 500m", en: "Row 500m" }, { fr: "Rameur 1000m", en: "Row 1km" }, { fr: "Rameur 2000m", en: "Row 2km" },
        { fr: "Rameur 5000m", en: "Row 5km" }, { fr: "Course 1 mile", en: "Run 1 Mile" }, { fr: "Course 5km", en: "Run 5k" },
        { fr: "Assault Bike (calories)", en: "Assault Bike Calories" }, { fr: "Double-unders max", en: "Max Double-unders" },
        { fr: "Burpees max en 5 min", en: "Max Burpees in 5min" }, { fr: "WOD Fran (temps)", en: "Fran Time" },
        { fr: "WOD Grace (temps)", en: "Grace Time" }, { fr: "WOD Murph (temps)", en: "Murph Time" }, { fr: "WOD Helen (temps)", en: "Helen Time" }
      ]
    };
    const categoriesChargeSeule = ["Haltérophilie / Weightlifting"];
    const categoriesForceRM = ["Renforcement"];

    const clientTabs = document.getElementById('client-tabs');
    const addClientForm = document.getElementById('add-client-form');
    const clientWorkspace = document.getElementById('client-workspace');
    const daysContainer = document.getElementById('days-container');
    const weekPicker = document.getElementById('week-picker');
    const weekInfo = document.getElementById('week-info');
    const selectedClientLabel = document.getElementById('selected-client-label');
    const categoryTabs = document.getElementById('category-tabs');
    const movementList = document.getElementById('movement-list');

    let clientsActifs = [];
    let selectedClientEmail = null;
    let currentMonday = null;
    let allRecords = [];
    let currentCategory = Object.keys(mouvements)[0];
    let openRow = null;

    Object.keys(mouvements).forEach(cat => {
      const btn = document.createElement('button');
      btn.textContent = cat;
      btn.className = "cat-tab px-4 py-2 rounded-full text-xs font-medium border transition-colors";
      btn.dataset.cat = cat;
      btn.addEventListener('click', () => { currentCategory = cat; openRow = null; renderCatTabs(); renderMovementList(); });
      categoryTabs.appendChild(btn);
    });

    // ---------- Onglets Programmation / Records ----------
    document.getElementById('tab-programmation').addEventListener('click', () => switchTab('programmation'));
    document.getElementById('tab-records').addEventListener('click', () => switchTab('records'));

    function switchTab(tab) {
      const isProg = tab === 'programmation';
      document.getElementById('section-programmation').classList.toggle('hidden', !isProg);
      document.getElementById('section-records').classList.toggle('hidden', isProg);
      document.getElementById('tab-programmation').classList.toggle('border-brand-blue', isProg);
      document.getElementById('tab-programmation').classList.toggle('text-[color:var(--accent)]', isProg);
      document.getElementById('tab-programmation').classList.toggle('border-transparent', !isProg);
      document.getElementById('tab-programmation').classList.toggle('text-[color:var(--fg-50)]', !isProg);
      document.getElementById('tab-records').classList.toggle('border-brand-blue', !isProg);
      document.getElementById('tab-records').classList.toggle('text-[color:var(--accent)]', !isProg);
      document.getElementById('tab-records').classList.toggle('border-transparent', isProg);
      document.getElementById('tab-records').classList.toggle('text-[color:var(--fg-50)]', isProg);
      if (!isProg) loadRecords();
    }

    function getMondayFromDateStr(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      const day = date.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      date.setDate(date.getDate() + diff);
      return date;
    }

    function formatDateKey(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function setWeek(mondayDate) {
      currentMonday = mondayDate;
      weekPicker.value = formatDateKey(currentMonday);
      const sunday = new Date(currentMonday);
      sunday.setDate(currentMonday.getDate() + 6);
      weekInfo.textContent = `Semaine du ${currentMonday.toLocaleDateString('fr-FR')} au ${sunday.toLocaleDateString('fr-FR')}`;
      buildDaysUI();
      loadExistingForWeek();
    }

    async function loadClients() {
      const { data } = await supabaseClient.from('clients_actifs').select('*').order('nom', { ascending: true });
      clientsActifs = data || [];
      renderTabs();
    }

    function renderTabs() {
      clientTabs.innerHTML = clientsActifs.map(c => `
        <button data-email="${c.email}" class="client-tab px-4 py-2 rounded-full text-sm border transition-colors ${
          selectedClientEmail === c.email ? 'bg-brand-blue text-white border-brand-blue' : 'border-[color:var(--border-strong)] hover:border-brand-blue'
        }">${c.nom || c.email}</button>
      `).join('') + `
        <button id="show-add-client" class="px-4 py-2 rounded-full text-sm border border-dashed border-[color:var(--border-strong)] hover:border-brand-blue transition-colors">+ Ajouter</button>
      `;

      document.querySelectorAll('.client-tab').forEach(btn => {
        btn.addEventListener('click', () => selectClient(btn.dataset.email));
      });
      document.getElementById('show-add-client').addEventListener('click', () => {
        addClientForm.classList.toggle('hidden');
      });
    }

    function selectClient(email) {
      selectedClientEmail = email;
      const client = clientsActifs.find(c => c.email === email);
      selectedClientLabel.textContent = `Client sélectionné : ${client?.nom ? client.nom + ' — ' : ''}${email}`;
      addClientForm.classList.add('hidden');
      clientWorkspace.classList.remove('hidden');
      renderTabs();
      switchTab('programmation');
      setWeek(getMondayFromDateStr(formatDateKey(new Date())));
    }

    document.getElementById('confirm-add-client').addEventListener('click', async () => {
      const email = document.getElementById('new-client-email').value.trim().toLowerCase();
      const nom = document.getElementById('new-client-nom').value.trim();
      if (!email) { alert("L'email est obligatoire."); return; }

      const { error } = await supabaseClient.from('clients_actifs').insert({ email, nom });
      if (error) { alert("Erreur : " + error.message); return; }

      document.getElementById('new-client-email').value = '';
      document.getElementById('new-client-nom').value = '';
      await loadClients();
      selectClient(email);
    });

    document.getElementById('remove-client-btn').addEventListener('click', async () => {
      if (!selectedClientEmail) return;
      if (!confirm(`Retirer ${selectedClientEmail} du suivi ? (ses séances déjà créées ne seront pas supprimées)`)) return;
      await supabaseClient.from('clients_actifs').delete().eq('email', selectedClientEmail);
      selectedClientEmail = null;
      clientWorkspace.classList.add('hidden');
      await loadClients();
    });

    document.getElementById('prev-week-btn').addEventListener('click', () => {
      const d = new Date(currentMonday);
      d.setDate(d.getDate() - 7);
      setWeek(d);
    });
    document.getElementById('next-week-btn').addEventListener('click', () => {
      const d = new Date(currentMonday);
      d.setDate(d.getDate() + 7);
      setWeek(d);
    });
    weekPicker.addEventListener('change', () => {
      if (!weekPicker.value) return;
      setWeek(getMondayFromDateStr(weekPicker.value));
    });

    document.getElementById('duplicate-week-btn').addEventListener('click', async () => {
      if (!selectedClientEmail || !currentMonday) return;
      if (!confirm("Dupliquer tous les exercices de cette semaine vers la semaine suivante ?")) return;

      const { data: exosActuels } = await supabaseClient
        .from('programmes')
        .select('*')
        .eq('client_email', selectedClientEmail)
        .eq('semaine_debut', formatDateKey(currentMonday));

      if (!exosActuels || exosActuels.length === 0) {
        alert("Aucun exercice à dupliquer cette semaine.");
        return;
      }

      const nextMonday = new Date(currentMonday);
      nextMonday.setDate(nextMonday.getDate() + 7);
      const nextMondayKey = formatDateKey(nextMonday);

      const copies = exosActuels.map(e => ({
        client_email: e.client_email, jour: e.jour, semaine_debut: nextMondayKey,
        exercice: e.exercice, series: e.series, repetitions: e.repetitions,
        temps_repos: e.temps_repos, rpe: e.rpe, tempo: e.tempo,
        lien_video: e.lien_video, description: e.description, ordre: e.ordre
      }));

      const { error } = await supabaseClient.from('programmes').insert(copies);
      if (error) { alert("Erreur : " + error.message); return; }

      alert(`${copies.length} exercice(s) dupliqué(s) vers la semaine suivante.`);
      setWeek(nextMonday);
    });

    function buildDaysUI() {
      daysContainer.innerHTML = jours.map((jour, i) => {
        const d = new Date(currentMonday);
        d.setDate(currentMonday.getDate() + i);
        const dateLabel = d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });

        return `
          <div class="rounded-xl border border-[color:var(--border)] p-4" data-jour="${jour}">
            <div class="flex items-center justify-between mb-3">
              <h3 class="font-heading uppercase font-bold text-sm">${jour} <span class="text-[color:var(--fg-40)] font-normal normal-case">— ${dateLabel}</span></h3>
            </div>

            <div class="mb-4">
              <label class="block text-xs uppercase tracking-widest text-[color:var(--fg-50)] font-semibold mb-1.5">Commentaire sur la composition de cette séance</label>
              <textarea class="jour-commentaire w-full px-3 py-2 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue" rows="2" placeholder="Ex : cette semaine on insiste sur le haut du corps, garde de la marge sur le squat..."></textarea>
              <div class="flex items-center gap-2 mt-1.5">
                <button class="save-comment-btn text-xs px-3 py-1.5 rounded-lg bg-brand-blue hover:bg-brand-blue-dark transition-colors text-white font-medium">Enregistrer le commentaire</button>
                <span class="comment-confirm hidden text-xs text-[color:var(--accent)] font-medium">Enregistré ✓</span>
              </div>
            </div>

            <div class="existing-list flex flex-col gap-2 mb-3"></div>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-2">
              <input type="text" placeholder="Exercice" class="ex-exercice px-3 py-2 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
              <input type="number" placeholder="Séries" class="ex-series px-3 py-2 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
              <input type="text" placeholder="Répétitions" class="ex-repetitions px-3 py-2 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
              <input type="text" placeholder="Repos" class="ex-repos px-3 py-2 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
              <input type="text" placeholder="RPE" class="ex-rpe px-3 py-2 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
              <input type="text" placeholder="Tempo" class="ex-tempo px-3 py-2 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
              <input type="text" placeholder="Lien vidéo" class="ex-video px-3 py-2 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue sm:col-span-2">
              <textarea placeholder="Explication de l'exercice (consignes, points d'attention...)" rows="2" class="ex-description px-3 py-2 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue sm:col-span-4"></textarea>
            </div>
            <div class="flex items-center gap-3">
              <button class="save-exercise-btn text-sm px-4 py-2 rounded-lg bg-brand-blue hover:bg-brand-blue-dark transition-colors text-white font-medium" data-editing-id="">
                + Ajouter cet exercice
              </button>
              <button class="cancel-edit-btn hidden text-xs text-[color:var(--fg-50)] hover:text-[color:var(--fg)] transition-colors underline underline-offset-4">
                Annuler la modification
              </button>
              <span class="save-confirm hidden text-xs text-[color:var(--accent)] font-medium">Enregistré ✓</span>
            </div>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.save-exercise-btn').forEach(btn => btn.addEventListener('click', () => saveExercise(btn)));
      document.querySelectorAll('.cancel-edit-btn').forEach(btn => btn.addEventListener('click', () => resetForm(btn.closest('[data-jour]'))));
      document.querySelectorAll('.save-comment-btn').forEach(btn => btn.addEventListener('click', () => saveComment(btn)));
    }

    async function saveComment(btn) {
      const card = btn.closest('[data-jour]');
      const jour = card.dataset.jour;
      if (!selectedClientEmail) { alert("Sélectionne un client d'abord."); return; }

      const commentaire = card.querySelector('.jour-commentaire').value.trim();
      const confirmSpan = card.querySelector('.comment-confirm');

      btn.disabled = true;
      btn.textContent = 'Enregistrement...';

      const { error } = await supabaseClient.from('notes_jour').upsert({
        client_email: selectedClientEmail, semaine_debut: formatDateKey(currentMonday),
        jour: jour, commentaire: commentaire, updated_at: new Date().toISOString()
      }, { onConflict: 'client_email,semaine_debut,jour' });

      btn.disabled = false;
      btn.textContent = 'Enregistrer le commentaire';

      if (error) { alert("Erreur : " + error.message); return; }

      confirmSpan.classList.remove('hidden');
      setTimeout(() => confirmSpan.classList.add('hidden'), 2500);
    }

    function resetForm(card) {
      card.querySelectorAll('.ex-exercice, .ex-series, .ex-repetitions, .ex-repos, .ex-rpe, .ex-tempo, .ex-video, .ex-description').forEach(input => input.value = '');
      const btn = card.querySelector('.save-exercise-btn');
      btn.dataset.editingId = '';
      btn.textContent = '+ Ajouter cet exercice';
      card.querySelector('.cancel-edit-btn').classList.add('hidden');
    }

    async function saveExercise(btn) {
      const card = btn.closest('[data-jour]');
      const jour = card.dataset.jour;

      if (!selectedClientEmail) { alert("Sélectionne un client d'abord."); return; }

      const exercice = card.querySelector('.ex-exercice').value.trim();
      if (!exercice) { alert("Le nom de l'exercice est obligatoire."); return; }

      const payload = {
        client_email: selectedClientEmail, jour: jour, semaine_debut: formatDateKey(currentMonday),
        exercice: exercice, series: Number(card.querySelector('.ex-series').value) || 0,
        repetitions: card.querySelector('.ex-repetitions').value.trim(),
        temps_repos: card.querySelector('.ex-repos').value.trim(),
        rpe: card.querySelector('.ex-rpe').value.trim(),
        tempo: card.querySelector('.ex-tempo').value.trim(),
        lien_video: card.querySelector('.ex-video').value.trim(),
        description: card.querySelector('.ex-description').value.trim(),
        ordre: jours.indexOf(jour)
      };

      const editingId = btn.dataset.editingId;
      const confirmSpan = card.querySelector('.save-confirm');
      btn.disabled = true;
      btn.textContent = editingId ? 'Mise à jour...' : 'Ajout...';

      let error;
      if (editingId) {
        ({ error } = await supabaseClient.from('programmes').update(payload).eq('id', editingId));
      } else {
        ({ error } = await supabaseClient.from('programmes').insert(payload));
      }

      btn.disabled = false;

      if (error) {
        alert("Erreur : " + error.message);
        btn.textContent = editingId ? 'Mettre à jour cet exercice' : '+ Ajouter cet exercice';
        return;
      }

      confirmSpan.classList.remove('hidden');
      setTimeout(() => confirmSpan.classList.add('hidden'), 2500);

      resetForm(card);
      loadExistingForWeek();
    }

    function editExercise(exo, card) {
      card.querySelector('.ex-exercice').value = exo.exercice || '';
      card.querySelector('.ex-series').value = exo.series || '';
      card.querySelector('.ex-repetitions').value = exo.repetitions || '';
      card.querySelector('.ex-repos').value = exo.temps_repos || '';
      card.querySelector('.ex-rpe').value = exo.rpe || '';
      card.querySelector('.ex-tempo').value = exo.tempo || '';
      card.querySelector('.ex-video').value = exo.lien_video || '';
      card.querySelector('.ex-description').value = exo.description || '';

      const btn = card.querySelector('.save-exercise-btn');
      btn.dataset.editingId = exo.id;
      btn.textContent = 'Mettre à jour cet exercice';
      card.querySelector('.cancel-edit-btn').classList.remove('hidden');

      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    async function loadExistingForWeek() {
      if (!selectedClientEmail || !currentMonday) return;

      const { data: exos } = await supabaseClient
        .from('programmes').select('*')
        .eq('client_email', selectedClientEmail).eq('semaine_debut', formatDateKey(currentMonday));

      const { data: notes } = await supabaseClient
        .from('notes_jour').select('*')
        .eq('client_email', selectedClientEmail).eq('semaine_debut', formatDateKey(currentMonday));

      document.querySelectorAll('.existing-list').forEach(el => el.innerHTML = '');
      document.querySelectorAll('.jour-commentaire').forEach(el => el.value = '');

      (notes || []).forEach(note => {
        const card = document.querySelector(`[data-jour="${note.jour}"]`);
        if (!card) return;
        card.querySelector('.jour-commentaire').value = note.commentaire || '';
      });

      (exos || []).forEach(exo => {
        const card = document.querySelector(`[data-jour="${exo.jour}"]`);
        if (!card) return;
        const list = card.querySelector('.existing-list');

        const row = document.createElement('button');
        row.type = 'button';
        row.className = "edit-row-btn text-left w-full text-sm bg-[color:var(--card)] hover:bg-[color:var(--card-hover)] transition-colors rounded-lg px-3 py-2";
        row.innerHTML = `
          <div class="flex items-center justify-between">
            <span class="font-medium">${exo.exercice}</span>
            <span class="delete-btn text-red-400 hover:text-red-300 text-xs ml-3 shrink-0" data-id="${exo.id}">Supprimer</span>
          </div>
          <div class="text-xs text-[color:var(--fg-50)] mt-0.5">
            ${exo.series}x${exo.repetitions}${exo.temps_repos ? ` · repos ${exo.temps_repos}` : ''}${exo.rpe ? ` · RPE ${exo.rpe}` : ''}${exo.tempo ? ` · tempo ${exo.tempo}` : ''}
          </div>
          ${exo.description ? `<div class="text-xs text-[color:var(--fg-40)] mt-1 italic">${exo.description}</div>` : ''}
        `;
        row.addEventListener('click', () => editExercise(exo, card));
        row.querySelector('.delete-btn').addEventListener('click', async (e) => {
          e.stopPropagation();
          await supabaseClient.from('programmes').delete().eq('id', exo.id);
          loadExistingForWeek();
        });

        list.appendChild(row);
      });
    }

    // ---------- RECORDS (identique à la version client) ----------
    function renderCatTabs() {
      document.querySelectorAll('.cat-tab').forEach(btn => {
        const active = btn.dataset.cat === currentCategory;
        btn.classList.toggle('bg-brand-blue', active);
        btn.classList.toggle('text-white', active);
        btn.classList.toggle('border-brand-blue', active);
        btn.classList.toggle('border-[color:var(--border-strong)]', !active);
      });
    }

    function bestValue(exercice, rm) {
      const matches = allRecords.filter(r => r.exercice === exercice && (rm === undefined ? true : r.repetitions_max === rm));
      if (matches.length === 0) return null;
      return matches.reduce((best, r) => (r.valeur > best.valeur ? r : best));
    }

    function movementKind(cat) {
      if (categoriesChargeSeule.includes(cat)) return 'kg-simple';
      if (categoriesForceRM.includes(cat)) return 'kg-rm';
      return 'unite-libre';
    }

    function renderMovementList() {
      const kind = movementKind(currentCategory);

      movementList.innerHTML = mouvements[currentCategory].map(m => {
        const isOpen = openRow === m.fr;
        let bestDisplay = '—';

        if (kind === 'kg-rm') {
          const b1 = bestValue(m.fr, 1);
          bestDisplay = b1 ? `${b1.valeur} kg (1RM)` : '—';
        } else {
          const b = bestValue(m.fr);
          bestDisplay = b ? `${b.valeur} ${b.unite}` : '—';
        }

        return `
          <div>
            <div class="flex items-center justify-between px-4 py-3.5 hover:bg-[color:var(--card)] transition-colors">
              <button type="button" class="open-detail-btn text-left flex-1" data-exercice="${m.fr}" data-en="${m.en}">
                <p class="text-sm font-medium">${m.en}</p>
                <p class="text-xs text-[color:var(--fg-40)]">${m.fr}</p>
              </button>
              <div class="flex items-center gap-2 shrink-0">
                <span class="font-heading font-bold text-[color:var(--accent)] text-sm">${bestDisplay}</span>
                <button type="button" class="toggle-quick-btn w-7 h-7 rounded-full border border-[color:var(--border-strong)] hover:border-brand-blue flex items-center justify-center text-xs" data-exercice="${m.fr}">✎</button>
                <button type="button" class="open-detail-btn text-[color:var(--fg-30)]" data-exercice="${m.fr}" data-en="${m.en}">›</button>
              </div>
            </div>

            ${isOpen ? renderQuickForm(m, kind) : ''}
          </div>
        `;
      }).join('');

      document.querySelectorAll('.toggle-quick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          openRow = openRow === btn.dataset.exercice ? null : btn.dataset.exercice;
          renderMovementList();
        });
      });

      document.querySelectorAll('.open-detail-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const p = new URLSearchParams({
            exercice: btn.dataset.exercice, en: btn.dataset.en,
            categorie: currentCategory, kind: kind, client: selectedClientEmail
          });
          window.location.href = `pr-detail.html?${p.toString()}`;
        });
      });

      document.querySelectorAll('.quick-save-btn').forEach(btn => {
        btn.addEventListener('click', () => saveQuickRecord(btn, kind));
      });
    }

    function renderQuickForm(m, kind) {
      const today = new Date().toISOString().split('T')[0];

      if (kind === 'kg-simple') {
        return `
          <div class="quick-form-wrapper px-4 pb-4 flex flex-wrap items-end gap-2 bg-[color:var(--card)]" data-exercice="${m.fr}">
            <div>
              <label class="block text-[10px] uppercase text-[color:var(--fg-40)] mb-1">Charge (kg)</label>
              <input type="number" step="0.5" class="quick-valeur w-24 px-2 py-1.5 rounded-md bg-[color:var(--bg)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
            </div>
            <div>
              <label class="block text-[10px] uppercase text-[color:var(--fg-40)] mb-1">Date</label>
              <input type="date" class="quick-date px-2 py-1.5 rounded-md bg-[color:var(--bg)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue" value="${today}">
            </div>
            <button type="button" class="quick-save-btn px-4 py-1.5 rounded-md bg-brand-blue hover:bg-brand-blue-dark text-white text-sm font-medium" data-exercice="${m.fr}">Enregistrer</button>
          </div>
        `;
      }

      if (kind === 'kg-rm') {
        return `
          <div class="quick-form-wrapper px-4 pb-4 flex flex-wrap items-end gap-2 bg-[color:var(--card)]" data-exercice="${m.fr}">
            <div>
              <label class="block text-[10px] uppercase text-[color:var(--fg-40)] mb-1">RM</label>
              <select class="quick-rm px-2 py-1.5 rounded-md bg-[color:var(--bg)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
                <option value="1">1RM</option>
                <option value="3">3RM</option>
                <option value="5">5RM</option>
              </select>
            </div>
            <div>
              <label class="block text-[10px] uppercase text-[color:var(--fg-40)] mb-1">Charge (kg)</label>
              <input type="number" step="0.5" class="quick-valeur w-24 px-2 py-1.5 rounded-md bg-[color:var(--bg)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
            </div>
            <div>
              <label class="block text-[10px] uppercase text-[color:var(--fg-40)] mb-1">Date</label>
              <input type="date" class="quick-date px-2 py-1.5 rounded-md bg-[color:var(--bg)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue" value="${today}">
            </div>
            <button type="button" class="quick-save-btn px-4 py-1.5 rounded-md bg-brand-blue hover:bg-brand-blue-dark text-white text-sm font-medium" data-exercice="${m.fr}">Enregistrer</button>
          </div>
        `;
      }

      return `
        <div class="quick-form-wrapper px-4 pb-4 flex flex-wrap items-end gap-2 bg-[color:var(--card)]" data-exercice="${m.fr}">
          <div>
            <label class="block text-[10px] uppercase text-[color:var(--fg-40)] mb-1">Valeur</label>
            <input type="number" step="0.5" class="quick-valeur w-24 px-2 py-1.5 rounded-md bg-[color:var(--bg)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
          </div>
          <div>
            <label class="block text-[10px] uppercase text-[color:var(--fg-40)] mb-1">Unité</label>
            <select class="quick-unite px-2 py-1.5 rounded-md bg-[color:var(--bg)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue">
              <option value="reps">reps</option>
              <option value="sec">sec</option>
              <option value="m">m</option>
              <option value="cal">cal</option>
              <option value="kg">kg</option>
            </select>
          </div>
          <div>
            <label class="block text-[10px] uppercase text-[color:var(--fg-40)] mb-1">Date</label>
            <input type="date" class="quick-date px-2 py-1.5 rounded-md bg-[color:var(--bg)] border border-[color:var(--border)] text-sm outline-none focus:border-brand-blue" value="${today}">
          </div>
          <button type="button" class="quick-save-btn px-4 py-1.5 rounded-md bg-brand-blue hover:bg-brand-blue-dark text-white text-sm font-medium" data-exercice="${m.fr}">Enregistrer</button>
        </div>
      `;
    }

    async function saveQuickRecord(btn, kind) {
      if (!selectedClientEmail) { alert("Sélectionne un client d'abord."); return; }

      const wrapper = btn.parentElement;
      const exercice = btn.dataset.exercice;

      const valeurInput = wrapper.querySelector('.quick-valeur');
      const dateInput = wrapper.querySelector('.quick-date');

      if (!valeurInput || !dateInput) {
        alert("Erreur interne : champs introuvables. Recharge la page et réessaie.");
        return;
      }

      const valeur = parseFloat(valeurInput.value);
      const date = dateInput.value || new Date().toISOString().split('T')[0];

      if (isNaN(valeur)) { alert("Renseigne une valeur."); return; }

      let unite = 'kg';
      let rm = 0;

      if (kind === 'kg-rm') {
        rm = Number(wrapper.querySelector('.quick-rm').value);
      } else if (kind === 'unite-libre') {
        unite = wrapper.querySelector('.quick-unite').value;
      }

      btn.disabled = true;
      btn.textContent = '...';

      const { error } = await supabaseClient.from('records').insert({
        client_email: selectedClientEmail,
        categorie: currentCategory,
        exercice: exercice,
        valeur: valeur,
        unite: unite,
        repetitions_max: rm,
        date_record: date,
        updated_at: new Date().toISOString()
      });

      btn.disabled = false;
      btn.textContent = 'Enregistrer';

      if (error) { alert("Erreur : " + error.message); return; }

      openRow = null;
      await loadRecords();
    }

    async function loadRecords() {
      if (!selectedClientEmail) return;
      const { data } = await supabaseClient
        .from('records').select('*').eq('client_email', selectedClientEmail);
      allRecords = data || [];
      renderCatTabs();
      renderMovementList();
    }

    async function checkAccess() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user || user.email !== ADMIN_EMAIL) {
        document.getElementById('denied').classList.remove('hidden');
        return;
      }
      document.getElementById('main-content').classList.remove('hidden');
      loadClients();
    }

    checkAccess();
  </script>

</body>
</html>
