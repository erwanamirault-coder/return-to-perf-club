    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // ---------- Helpers pour l'onglet Suivi ----------
    const offsetJour = { "Lundi": 0, "Mardi": 1, "Mercredi": 2, "Jeudi": 3, "Vendredi": 4, "Samedi": 5, "Dimanche": 6 };
    const joursLettres = ["L", "M", "M", "J", "V", "S", "D"];

    function getMondayOfDate(d) {
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      const monday = new Date(d);
      monday.setDate(d.getDate() + diff);
      return monday;
    }
    function calculerDate(semaine_debut, jour) {
      if (!semaine_debut || !jour || offsetJour[jour] === undefined) return null;
      const [y, m, d] = semaine_debut.split('-').map(Number);
      const lundi = new Date(y, m - 1, d);
      lundi.setDate(lundi.getDate() + offsetJour[jour]);
      return formatDateKey(lundi);
    }
    function parseFirstNumber(str) {
      if (str === null || str === undefined || str === '') return null;
      const match = String(str).match(/[\d.]+/);
      return match ? parseFloat(match[0]) : null;
    }
    function tonnageOf(exo) {
      const charge = (exo.charge !== null && exo.charge !== undefined) ? parseFloat(exo.charge) : null;
      const reps = parseFirstNumber(exo.repetitions);
      const series = parseFloat(exo.series) || 0;
      if (charge === null || reps === null || isNaN(charge) || isNaN(reps)) return null;
      return charge * reps * series;
    }
    function drawLineChart(svgEl, emptyEl, values) {
      const validIndexes = values.map((v, i) => (v !== null && v !== undefined && !isNaN(v)) ? i : null).filter(i => i !== null);
      if (validIndexes.length < 2) {
        svgEl.innerHTML = '';
        emptyEl.classList.remove('hidden');
        return;
      }
      emptyEl.classList.add('hidden');
      const w = 300, h = 150, pad = 15;
      const validValues = validIndexes.map(i => values[i]);
      const min = Math.min(...validValues), max = Math.max(...validValues);
      const range = (max - min) || 1;
      const n = values.length;

      const coords = values.map((v, i) => {
        if (v === null || v === undefined || isNaN(v)) return null;
        const x = pad + (i / (n - 1)) * (w - pad * 2);
        const y = h - pad - ((v - min) / range) * (h - pad * 2);
        return { x, y };
      });

      let path = '', started = false;
      coords.forEach(c => {
        if (!c) { started = false; return; }
        path += (started ? 'L' : 'M') + c.x + ',' + c.y + ' ';
        started = true;
      });
      const dots = coords.filter(c => c).map(c => `<circle cx="${c.x}" cy="${c.y}" r="3" fill="#2D7AED" />`).join('');
      svgEl.innerHTML = `<path d="${path.trim()}" fill="none" stroke="#2D7AED" stroke-width="2" />${dots}`;
    }

    function draftKey(jour) {
      return `draft:${selectedClientEmail}:${formatDateKey(currentMonday)}:${jour}`;
    }
    function collectFormValues(card) {
      const btn = card.querySelector('.save-exercise-btn');
      return {
        exercice: card.querySelector('.ex-exercice').value,
        series: card.querySelector('.ex-series').value,
        repetitions: card.querySelector('.ex-repetitions').value,
        charge: card.querySelector('.ex-charge').value,

        description: card.querySelector('.ex-description').value,
        editingId: btn.dataset.editingId || '',
        editingOrdre: btn.dataset.editingOrdre || ''
      };
    }
    function saveDraftLocal(card, jour) {
      try { localStorage.setItem(draftKey(jour), JSON.stringify(collectFormValues(card))); } catch (e) {}
    }
    function loadDraftLocal(jour) {
      try {
        const raw = localStorage.getItem(draftKey(jour));
        return raw ? JSON.parse(raw) : null;
      } catch (e) { return null; }
    }
    function clearDraftLocal(jour) {
      try { localStorage.removeItem(draftKey(jour)); } catch (e) {}
    }
    function updateAutosaveStatus(card, state) {
      const el = card.querySelector('.autosave-status');
      if (!el) return;
      if (state === 'unsaved') el.textContent = 'Modifications non enregistrées...';
      else if (state === 'saved') el.textContent = 'Enregistré automatiquement ✓';
      else if (state === 'error') el.textContent = 'Erreur de sauvegarde ⚠️';
      else el.textContent = '';
    }

    async function persistExerciseFromCard(card, opts = {}) {
      const jour = card.dataset.jour;
      if (!selectedClientEmail || !currentMonday) return null;

      const exercice = card.querySelector('.ex-exercice').value.trim();
      if (!exercice) return null;

      const btn = card.querySelector('.save-exercise-btn');
      const chargeValue = card.querySelector('.ex-charge').value.trim();
      const editingId = btn.dataset.editingId;

      let ordre;
      if (editingId && btn.dataset.editingOrdre !== '') {
        ordre = Number(btn.dataset.editingOrdre);
      } else if (editingId) {
        ordre = 0;
      } else {
        ordre = card.querySelector('.existing-list').children.length;
      }

      const payload = {
        client_email: selectedClientEmail, jour: jour, semaine_debut: formatDateKey(currentMonday),
        exercice: exercice, series: Number(card.querySelector('.ex-series').value) || 0,
        repetitions: card.querySelector('.ex-repetitions').value.trim(),
        charge: chargeValue === '' ? null : parseFloat(chargeValue),
        temps_repos: card.querySelector('.ex-repos').value.trim(),
        rpe: card.querySelector('.ex-rpe').value.trim(),
        tempo: card.querySelector('.ex-tempo').value.trim(),
        lien_video: card.querySelector('.ex-video').value.trim(),
        description: card.querySelector('.ex-description').value.trim(),
        ordre: ordre
      };

      let result;
      if (editingId) {
        result = await supabaseClient.from('programmes').update(payload).eq('id', editingId).select().single();
      } else {
        result = await supabaseClient.from('programmes').insert(payload).select().single();
      }

      if (result.error) {
        if (!opts.silent) alert("Erreur : " + result.error.message);
        updateAutosaveStatus(card, 'error');
        return null;
      }

      if (!editingId && result.data) {
        btn.dataset.editingId = result.data.id;
        btn.dataset.editingOrdre = result.data.ordre;
      }

      clearDraftLocal(jour);
      pendingUnsyncedByJour[jour] = false;
      updateAutosaveStatus(card, 'saved');
      return result.data;
    }

    function restoreDraft(card, jour, draft) {
      card.querySelector('.ex-exercice').value = draft.exercice || '';

      card.querySelector('.ex-video').value = draft.video || '';
      card.querySelector('.ex-description').value = draft.description || '';
      const btn = card.querySelector('.save-exercise-btn');
      if (draft.editingId) {
        btn.dataset.editingId = draft.editingId;
        btn.dataset.editingOrdre = draft.editingOrdre || '';
        btn.textContent = 'Mettre à jour cet exercice';
        card.querySelector('.cancel-edit-btn').classList.remove('hidden');
      }
      card.querySelector('.draft-banner').classList.add('hidden');
      persistExerciseFromCard(card, { silent: true }).then(() => loadExistingForWeek());
    }

    function getMondayFromDateStr(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      const day = date.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      date.setDate(date.getDate() + diff);
      return date;
    }

      return `${y}-${m}-${day}`;

    async function saveComment(btn) {
      const card = btn.closest('[data-jour]');
      const jour = card.dataset.jour;
      if (!selectedClientEmail) { alert("Sélectionne un client d'abord."); return; }

      const commentaire = card.querySelector('.jour-commentaire').value.trim();
      const confirmSpan = card.querySelector('.comment-confirm');

      btn.disabled = true;
      btn.textContent = 'Enregistrement...';

      const { error } = await supabaseClient.from('notes_jour').upsert({
        client_email: selectedClientEmail, semaine_debut: formatDateKey(currentMonday),
        jour: jour, commentaire: commentaire, updated_at: new Date().toISOString()
      }, { onConflict: 'client_email,semaine_debut,jour' });

      btn.disabled = false;
      btn.textContent = 'Enregistrer le commentaire';

      if (error) { alert("Erreur : " + error.message); return; }

      confirmSpan.classList.remove('hidden');
      setTimeout(() => confirmSpan.classList.add('hidden'), 2500);
    }

    function resetForm(card) {
      card.querySelectorAll('.ex-exercice, .ex-series, .ex-repetitions, .ex-charge, .ex-repos, .ex-rpe, .ex-tempo, .ex-video, .ex-description').forEach(input => input.value = '');
      const btn = card.querySelector('.save-exercise-btn');
      btn.dataset.editingId = '';
      btn.dataset.editingOrdre = '';
      btn.textContent = '+ Ajouter cet exercice';
      card.querySelector('.cancel-edit-btn').classList.add('hidden');
      clearDraftLocal(card.dataset.jour);
      pendingUnsyncedByJour[card.dataset.jour] = false;
      updateAutosaveStatus(card, 'idle');
    }

    async function saveExercise(btn) {
      const card = btn.closest('[data-jour]');

      if (!selectedClientEmail) { alert("Sélectionne un client d'abord."); return; }
      if (!card.querySelector('.ex-exercice').value.trim()) { alert("Le nom de l'exercice est obligatoire."); return; }

      clearTimeout(autosaveTimers[card.dataset.jour]);

      const wasEditing = !!btn.dataset.editingId;
      const confirmSpan = card.querySelector('.save-confirm');
      btn.disabled = true;
      btn.textContent = wasEditing ? 'Mise à jour...' : 'Ajout...';

      const saved = await persistExerciseFromCard(card, { silent: false });

      btn.disabled = false;

      if (!saved) {
        btn.textContent = wasEditing ? 'Mettre à jour cet exercice' : '+ Ajouter cet exercice';
        return;
      }

      confirmSpan.classList.remove('hidden');
      setTimeout(() => confirmSpan.classList.add('hidden'), 2500);

      resetForm(card);
      loadExistingForWeek();
    }

      card.querySelector('.ex-series').value = exo.series || '';
      card.querySelector('.ex-repetitions').value = exo.repetitions || '';
      card.querySelector('.ex-charge').value = (exo.charge !== null && exo.charge !== undefined) ? exo.charge : '';
      card.querySelector('.ex-repos').value = exo.temps_repos || '';
      card.querySelector('.ex-rpe').value = exo.rpe || '';
      card.querySelector('.ex-tempo').value = exo.tempo || '';

      card.querySelector('.ex-description').value = exo.description || '';

    async function copyExerciseToDay(exo, targetJour) {
      const targetCard = document.querySelector(`[data-jour="${targetJour}"]`);

      const targetList = targetCard.querySelector('.existing-list');
      const newOrdre = targetList.children.length;

      const payload = {
        client_email: selectedClientEmail, jour: targetJour, semaine_debut: formatDateKey(currentMonday),
        exercice: exo.exercice, series: exo.series, repetitions: exo.repetitions,
        charge: (exo.charge !== null && exo.charge !== undefined) ? exo.charge : null,
        temps_repos: exo.temps_repos, rpe: exo.rpe, tempo: exo.tempo,
        lien_video: exo.lien_video, description: exo.description, ordre: newOrdre
      };

      const { error } = await supabaseClient.from('programmes').insert(payload);

    // ---------- Réordonnancement fiable (boutons ▲▼) ----------
    async function moveExercise(jour, exoId, direction) {
      const card = document.querySelector(`[data-jour="${jour}"]`);
      if (!card) return;
      const list = card.querySelector('.existing-list');
      const rows = [...list.querySelectorAll('.exo-row')];
      const idx = rows.findIndex(r => r.dataset.id === String(exoId));
      const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
      if (idx === -1 || swapIdx < 0 || swapIdx >= rows.length) return;

      const rowA = rows[idx];
      const rowB = rows[swapIdx];

      // Réordonnancement visuel immédiat
      if (direction === 'up') list.insertBefore(rowA, rowB);
      else list.insertBefore(rowB, rowA);

      // Sauvegarde fiable : on renumérote toute la liste dans son nouvel ordre
      const newRows = [...list.querySelectorAll('.exo-row')];
      await Promise.all(
        newRows.map((r, i) => supabaseClient.from('programmes').update({ ordre: i }).eq('id', r.dataset.id))
      );
    }

    function bestValue(exercice, rm) {
      const matches = allRecords.filter(r => r.exercice === exercice && (rm === undefined ? true : r.repetitions_max === rm));
      if (matches.length === 0) return null;
      return matches.reduce((best, r) => (r.valeur > best.valeur ? r : best));
    }

      if (categoriesChargeSeule.includes(cat)) return 'kg-simple';
      if (categoriesForceRM.includes(cat)) return 'kg-rm';
      return 'unite-libre';

    async function saveQuickRecord(btn, kind) {
      if (!selectedClientEmail) { alert("Sélectionne un client d'abord."); return; }

      const wrapper = btn.parentElement;
      const exercice = btn.dataset.exercice;

      const valeurInput = wrapper.querySelector('.quick-valeur');
      const dateInput = wrapper.querySelector('.quick-date');

      if (!valeurInput || !dateInput) {
        alert("Erreur interne : champs introuvables. Recharge la page et réessaie.");
        return;
      }

      const valeur = parseFloat(valeurInput.value);
      const date = dateInput.value || new Date().toISOString().split('T')[0];

      if (isNaN(valeur)) { alert("Renseigne une valeur."); return; }

      let unite = 'kg';
      let rm = 0;

      if (kind === 'kg-rm') {
        rm = Number(wrapper.querySelector('.quick-rm').value);
      } else if (kind === 'unite-libre') {
        unite = wrapper.querySelector('.quick-unite').value;
      }

      btn.disabled = true;
      btn.textContent = '...';

      const { error } = await supabaseClient.from('records').insert({
        client_email: selectedClientEmail,
        categorie: currentCategory,
        exercice: exercice,
        valeur: valeur,
        unite: unite,
        repetitions_max: rm,
        date_record: date,
        updated_at: new Date().toISOString()
      });

      btn.disabled = false;
      btn.textContent = 'Enregistrer';

      if (error) { alert("Erreur : " + error.message); return; }

      openRow = null;
      await loadRecords();
    }

    async function loadRecords() {
      if (!selectedClientEmail) return;
      const { data } = await supabaseClient
        .from('records').select('*').eq('client_email', selectedClientEmail);
      allRecords = data || [];
      renderCatTabs();
      renderMovementList();
    }

    // ---------- Onglet Suivi (stats + wellness + détail par séance + retours) ----------
    async function loadSuiviData() {
      if (!selectedClientEmail) return;
      if (suiviLoadedFor === selectedClientEmail) { renderSuiviAll(); return; }

      const { data: programmes } = await supabaseClient
        .from('programmes').select('*').eq('client_email', selectedClientEmail);
      allProgrammesCache = programmes || [];

    function loadStatsSuivi() {
      const exos = allProgrammesCache;

      const today = new Date();
      const monday = getMondayOfDate(today);
      const mondayKey = formatDateKey(monday);
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);
      const sundayKey = formatDateKey(sunday);
      const currentMonthPrefix = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;

      const exosSemaine = exos.filter(e => e._date && e._date >= mondayKey && e._date <= sundayKey);
      const exosMois = exos.filter(e => e._date && e._date.startsWith(currentMonthPrefix));

      function computeStats(list) {
        const rpes = list.map(e => parseFirstNumber(e.rpe)).filter(v => v !== null);
        const tonnages = list.map(tonnageOf).filter(v => v !== null);
        const rpeAvg = rpes.length ? (rpes.reduce((a, b) => a + b, 0) / rpes.length) : null;
        const tonnageSum = tonnages.length ? tonnages.reduce((a, b) => a + b, 0) : null;
        return { rpeAvg, tonnageSum };
      }
      const statsSemaine = computeStats(exosSemaine);
      const statsMois = computeStats(exosMois);

      document.getElementById('suivi-week-rpe').textContent = statsSemaine.rpeAvg !== null ? statsSemaine.rpeAvg.toFixed(1) : '—';
      document.getElementById('suivi-week-tonnage').textContent = statsSemaine.tonnageSum !== null ? Math.round(statsSemaine.tonnageSum).toLocaleString('fr-FR') + ' kg' : '—';
      document.getElementById('suivi-month-rpe').textContent = statsMois.rpeAvg !== null ? statsMois.rpeAvg.toFixed(1) : '—';
      document.getElementById('suivi-month-tonnage').textContent = statsMois.tonnageSum !== null ? Math.round(statsMois.tonnageSum).toLocaleString('fr-FR') + ' kg' : '—';

      const semaines = [...new Set(exos.map(e => e.semaine_debut))].filter(Boolean).sort().slice(-8);
      const tonnageValues = semaines.map(sem => {
        const list = exos.filter(e => e.semaine_debut === sem);
        const t = list.map(tonnageOf).filter(v => v !== null);
        return t.length ? t.reduce((a, b) => a + b, 0) : null;
      });
      const rpeValues = semaines.map(sem => {
        const list = exos.filter(e => e.semaine_debut === sem);
        const r = list.map(e => parseFirstNumber(e.rpe)).filter(v => v !== null);
        return r.length ? (r.reduce((a, b) => a + b, 0) / r.length) : null;
      });

      drawLineChart(document.getElementById('suivi-chart-tonnage'), document.getElementById('suivi-chart-tonnage-empty'), tonnageValues);
      drawLineChart(document.getElementById('suivi-chart-rpe'), document.getElementById('suivi-chart-rpe-empty'), rpeValues);

      const labelsHtml = semaines.map(sem => {
        const [y, m, d] = sem.split('-');
        return `<span>${d}/${m}</span>`;
      }).join('');
      document.getElementById('suivi-tonnage-labels').innerHTML = labelsHtml;
      document.getElementById('suivi-rpe-labels').innerHTML = labelsHtml;

      // Wellness — moyennes séparées (jamais mélangées)
      const wellness = Object.values(wellnessByDate);
      const wellnessSemaine = wellness.filter(w => w.date >= mondayKey && w.date <= sundayKey);
      const wellnessMoisData = wellness.filter(w => w.date.startsWith(currentMonthPrefix));

      const criteres = [
        { key: 'sommeil', label: '😴 Sommeil' },
        { key: 'fatigue', label: '🔋 Fatigue' },
        { key: 'courbatures', label: '💪 Courbatures' },
        { key: 'stress', label: '😰 Stress' },
        { key: 'motivation', label: '🔥 Motivation' }
      ];

      function renderWellnessAvg(list, containerId) {
        const container = document.getElementById(containerId);
        if (list.length === 0) {
          container.innerHTML = `<p class="text-xs text-[color:var(--fg-40)]">—</p>`;
          return;
        }
        container.innerHTML = criteres.map(c => {
          const values = list.map(w => w[c.key]).filter(v => v !== null && v !== undefined);
          const avg = values.length ? (values.reduce((a, b) => a + b, 0) / values.length) : null;
          return `<div class="flex items-center justify-between"><span class="text-[color:var(--fg-60)]">${c.label}</span><span class="font-semibold">${avg !== null ? avg.toFixed(1) : '—'}/5</span></div>`;
        }).join('');
      }
      renderWellnessAvg(wellnessSemaine, 'suivi-week-wellness');
      renderWellnessAvg(wellnessMoisData, 'suivi-month-wellness');
      document.getElementById('suivi-wellness-empty').classList.toggle('hidden', wellness.length > 0);
    }

    // ---------- Onglet Nutrition ----------
    let currentClientPoidsHistory = [];

    function calcAge(dateNaissance) {
      if (!dateNaissance) return null;
      const today = new Date();
      const dob = new Date(dateNaissance);
      let age = today.getFullYear() - dob.getFullYear();
      const m = today.getMonth() - dob.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
      return age;
    }

    function calcMB(sexe, poids, taille, age) {
      const base = (10 * poids) + (6.25 * taille) - (5 * age);
      return sexe === 'homme' ? base + 5 : base - 161;
    }

    function calcNutrition(n) {
      const mb = calcMB(n.sexe, n.poids, n.taille, n.age);
      const mbActif = mb * n.activite;
      const totalPrise = mbActif + n.surplus_calorique;
      const totalPerte = mbActif - n.deficit_calorique;

      const proteinesG = n.poids * n.ratio_proteines;
      const lipidesG = n.poids * n.ratio_lipides;
      const proteinesKcal = proteinesG * 4;
      const lipidesKcal = lipidesG * 9;

      const glucidesKcalPrise = Math.max(0, totalPrise - proteinesKcal - lipidesKcal);
      const glucidesKcalPerte = Math.max(0, totalPerte - proteinesKcal - lipidesKcal);

      return {
        mb, mbActif, totalPrise, totalPerte,
        proteinesG, lipidesG, proteinesKcal, lipidesKcal,
        glucidesGPrise: glucidesKcalPrise / 4, glucidesKcalPrise,
        glucidesGPerte: glucidesKcalPerte / 4, glucidesKcalPerte
      };
    }

    function renderNutritionResults(r) {
      document.getElementById('nut-results').classList.remove('hidden');
      document.getElementById('nut-mb').textContent = Math.round(r.mb) + ' kcal';
      document.getElementById('nut-mb-actif').textContent = Math.round(r.mbActif) + ' kcal';
      document.getElementById('nut-total-prise').textContent = Math.round(r.totalPrise);
      document.getElementById('nut-total-perte').textContent = Math.round(r.totalPerte);

      document.getElementById('nut-macros-prise').innerHTML = `
        <div class="flex justify-between"><span>Protéines</span><span>${r.proteinesG.toFixed(1)} g (${Math.round(r.proteinesKcal)} kcal)</span></div>
        <div class="flex justify-between"><span>Lipides</span><span>${r.lipidesG.toFixed(1)} g (${Math.round(r.lipidesKcal)} kcal)</span></div>
        <div class="flex justify-between"><span>Glucides</span><span>${r.glucidesGPrise.toFixed(1)} g (${Math.round(r.glucidesKcalPrise)} kcal)</span></div>
      `;
      document.getElementById('nut-macros-perte').innerHTML = `
        <div class="flex justify-between"><span>Protéines</span><span>${r.proteinesG.toFixed(1)} g (${Math.round(r.proteinesKcal)} kcal)</span></div>
        <div class="flex justify-between"><span>Lipides</span><span>${r.lipidesG.toFixed(1)} g (${Math.round(r.lipidesKcal)} kcal)</span></div>
        <div class="flex justify-between"><span>Glucides</span><span>${r.glucidesGPerte.toFixed(1)} g (${Math.round(r.glucidesKcalPerte)} kcal)</span></div>
      `;
    }

      if (!currentClientPoidsHistory.length) return null;
      return [...currentClientPoidsHistory].sort((a, b) => b.date.localeCompare(a.date))[0].poids;
    }

    async function tryComputeNutrition() {
      const client = clientsActifs.find(c => c.email === selectedClientEmail);
      const latestPoids = getLatestPoids();
      const age = client ? calcAge(client.date_naissance) : null;
      const missing = document.getElementById('nut-missing-data');

      if (!client || !client.date_naissance || !client.taille || !client.sexe || !latestPoids) {
        missing.classList.remove('hidden');
        document.getElementById('nut-results').classList.add('hidden');
        return;
      }
      missing.classList.add('hidden');

      const n = {
        sexe: client.sexe, age, taille: Number(client.taille), poids: Number(latestPoids),
        activite: Number(document.getElementById('nut-activite').value),
        ratio_proteines: Number(document.getElementById('nut-ratio-prot').value) || 1.9,
        ratio_lipides: Number(document.getElementById('nut-ratio-lip').value) || 0.8,
        surplus_calorique: Number(document.getElementById('nut-surplus').value) || 0,
        deficit_calorique: Number(document.getElementById('nut-deficit').value) || 0
      };
      renderNutritionResults(calcNutrition(n));
    }

    async function loadInstagramPosts() {
      const loading = document.getElementById('ig-posts-loading');
      const errorEl = document.getElementById('ig-posts-error');
      const grid = document.getElementById('ig-posts-grid');
      loading.classList.remove('hidden');
      errorEl.classList.add('hidden');

      try {
        const response = await fetch('/api/instagram-posts', {
          headers: { 'x-admin-secret': ADMIN_API_SECRET }
        });
        const data = await response.json();

        if (!response.ok || data.error) {
          throw new Error(data.error || 'Erreur inconnue');
        }

        instagramPostsCache = data.posts || [];
        renderPostsGrid();
      } catch (err) {
        errorEl.textContent = "Impossible de charger tes publications (connexion Instagram non validée, ou " + err.message + ")";
        errorEl.classList.remove('hidden');
      } finally {
        loading.classList.add('hidden');
      }
    }

      const grid = document.getElementById('ig-posts-grid');
      grid.innerHTML = instagramPostsCache.map(p => `

          <img src="${p.thumbnail}" class="w-full h-full object-cover" alt="">
        </button>

      document.querySelectorAll('.ig-post-thumb').forEach(btn => {
        btn.addEventListener('click', () => {
          const post = instagramPostsCache.find(p => p.id === btn.dataset.id);
          selectedPostId = post.id;
          selectedPostThumbnail = post.thumbnail;
          selectedPostCaption = post.caption;
          renderPostsGrid();
          const selectedEl = document.getElementById('ig-selected-post');
          selectedEl.textContent = '✓ Post sélectionné : ' + (post.caption ? post.caption.slice(0, 60) : post.id);
          selectedEl.classList.remove('hidden');
        });

    function openFormationForm(formation) {
      formationFormError.classList.add('hidden');
      formationForm.reset();
      if (formation) {
        formationFormTitle.textContent = 'Modifier la formation';
        document.getElementById('f-id').value = formation.id;
        document.getElementById('f-titre').value = formation.titre;
        document.getElementById('f-accroche').value = formation.accroche;
        document.getElementById('f-niveau').value = formation.niveau || '';
        document.getElementById('f-prix').value = formation.prix;
        document.getElementById('f-image').value = formation.image_url || '';
        document.getElementById('f-description').value = formation.description;
        document.getElementById('f-programme').value = (formation.programme || []).join('\n');
        document.getElementById('f-stripe-price-id').value = formation.stripe_price_id || '';
        document.getElementById('f-actif').checked = formation.actif;
      } else {
        formationFormTitle.textContent = 'Nouvelle formation';
        document.getElementById('f-id').value = '';
        document.getElementById('f-actif').checked = true;
      }
      formationFormPanel.classList.remove('hidden');
      formationFormPanel.scrollIntoView({ behavior: 'smooth' });
    }

    formationForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      formationFormError.classList.add('hidden');

      const id = document.getElementById('f-id').value;
      const payload = {
        titre: document.getElementById('f-titre').value.trim(),
        accroche: document.getElementById('f-accroche').value.trim(),
        niveau: document.getElementById('f-niveau').value.trim() || 'Tous niveaux',
        prix: parseFloat(document.getElementById('f-prix').value),
        image_url: document.getElementById('f-image').value.trim(),
        description: document.getElementById('f-description').value.trim(),
        programme: document.getElementById('f-programme').value
          .split('\n')
          .map(l => l.trim())
          .filter(Boolean),
        stripe_price_id: document.getElementById('f-stripe-price-id').value.trim(),
        actif: document.getElementById('f-actif').checked,
      };

      const query = id
        ? supabaseClient.from('formations').update(payload).eq('id', id)
        : supabaseClient.from('formations').insert(payload);

      const { error } = await query;
      if (error) {
        formationFormError.textContent = "Erreur lors de l'enregistrement : " + error.message;
        formationFormError.classList.remove('hidden');
        return;
      }

      formationFormPanel.classList.add('hidden');
      loadFormations();
    });

    async function deleteFormation(id) {
      if (!confirm('Supprimer définitivement cette formation ?')) return;
      const { error } = await supabaseClient.from('formations').delete().eq('id', id);
      if (error) {
        alert("Erreur lors de la suppression : " + error.message);
        return;
      }
      loadFormations();
    }

    // ===================================================================
    // GESTION DU CONTENU (vidéos / PDF) D'UNE FORMATION
    // ===================================================================
    const contentPanel = document.getElementById('content-panel');
    const contentPanelTitre = document.getElementById('content-panel-titre');
    const contentLeconsList = document.getElementById('content-lecons-list');
    let currentContentFormationId = null;

    async function openContentPanel(formationId, titre) {
      currentContentFormationId = formationId;
      contentPanelTitre.textContent = titre;
      contentPanel.classList.remove('hidden');
      document.getElementById('upload-error').classList.add('hidden');
      contentPanel.scrollIntoView({ behavior: 'smooth' });
      await loadContentLecons();
    }

    document.getElementById('close-content-panel-btn').addEventListener('click', () => {
      contentPanel.classList.add('hidden');
      currentContentFormationId = null;
    });

    async function loadContentLecons() {
      contentLeconsList.innerHTML = `<p class="text-xs text-[color:var(--fg-50)]">Chargement...</p>`;

      const { data, error } = await supabaseClient
        .from('formation_contenu')
        .select('*')
        .eq('formation_id', currentContentFormationId)
        .order('ordre', { ascending: true });

      if (error) {
        contentLeconsList.innerHTML = `<p class="text-xs text-red-500">Erreur : ${error.message}</p>`;
        return;
      }

      if (!data || data.length === 0) {
        contentLeconsList.innerHTML = `<p class="text-xs text-[color:var(--fg-50)]">Aucune leçon pour l'instant.</p>`;
        return;
      }

      // Regrouper par section, en gardant l'ordre d'apparition
      const sections = [];
      const bySections = {};
      data.forEach(lecon => {
        const sec = lecon.section || 'Contenu';
        if (!bySections[sec]) { bySections[sec] = []; sections.push(sec); }
        bySections[sec].push(lecon);
      });

      contentLeconsList.innerHTML = sections.map(sec => `
        <div class="mb-1">
          <p class="text-[11px] uppercase tracking-widest font-semibold text-[color:var(--accent)] mb-1.5">${sec}</p>
          <div class="flex flex-col gap-1.5">
            ${bySections[sec].map((lecon, i) => `
              <div class="flex items-center justify-between gap-2 p-2.5 rounded-lg bg-[color:var(--bg)] border border-[color:var(--border)]">
                <p class="text-xs">
                  ${lecon.type === 'video' ? '🎥' : '📄'} ${lecon.titre}
                </p>
                <button data-id="${lecon.id}" data-path="${lecon.chemin_storage}" class="delete-lecon-btn text-[11px] px-2 py-1 rounded-md border border-red-300 text-red-500 hover:bg-red-500/10 transition-colors">Supprimer</button>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.delete-lecon-btn').forEach(btn =>
        btn.addEventListener('click', () => deleteLecon(btn.dataset.id, btn.dataset.path))
      );
    }

    let videoSourceMode = 'upload'; // 'upload' | 'youtube'

    function setVideoSourceMode(mode) {
      videoSourceMode = mode;
      const uploadBtn = document.getElementById('source-upload-btn');
      const youtubeBtn = document.getElementById('source-youtube-btn');
      const uploadZone = document.getElementById('upload-file-zone');
      const youtubeZone = document.getElementById('youtube-url-zone');

      uploadBtn.classList.toggle('border-brand-blue', mode === 'upload');
      uploadBtn.classList.toggle('bg-brand-blue/10', mode === 'upload');
      uploadBtn.classList.toggle('text-[color:var(--accent)]', mode === 'upload');
      uploadBtn.classList.toggle('border-[color:var(--border)]', mode !== 'upload');
      uploadBtn.classList.toggle('text-[color:var(--fg-50)]', mode !== 'upload');

      youtubeBtn.classList.toggle('border-brand-blue', mode === 'youtube');
      youtubeBtn.classList.toggle('bg-brand-blue/10', mode === 'youtube');
      youtubeBtn.classList.toggle('text-[color:var(--accent)]', mode === 'youtube');
      youtubeBtn.classList.toggle('border-[color:var(--border)]', mode !== 'youtube');
      youtubeBtn.classList.toggle('text-[color:var(--fg-50)]', mode !== 'youtube');

      uploadZone.classList.toggle('hidden', mode !== 'upload');
      youtubeZone.classList.toggle('hidden', mode !== 'youtube');
    }

    document.getElementById('source-upload-btn').addEventListener('click', () => setVideoSourceMode('upload'));
    document.getElementById('source-youtube-btn').addEventListener('click', () => setVideoSourceMode('youtube'));

    document.getElementById('new-lecon-type').addEventListener('change', updateSourceLabelsForType);

    function updateSourceLabelsForType() {
      const type = document.getElementById('new-lecon-type').value;
      const sourceLabel = document.getElementById('source-label');
      const sourceHelp = document.getElementById('source-help');
      const youtubeBtn = document.getElementById('source-youtube-btn');
      const externalLabel = document.getElementById('external-url-label');
      const youtubeInput = document.getElementById('new-lecon-youtube');

      if (type === 'pdf') {
        sourceLabel.textContent = 'Source du document';
        youtubeBtn.textContent = '🔗 Lien externe';
        sourceHelp.textContent = 'Uploader = protection maximale (lien temporaire, régénéré à chaque téléchargement, valable 6h). Lien externe (Google Drive, Dropbox...) = pratique, mais accessible en permanence à quiconque a le lien.';
        externalLabel.textContent = 'Lien externe vers le document (Google Drive, Dropbox...)';
        youtubeInput.placeholder = 'https://drive.google.com/...';
      } else {
        sourceLabel.textContent = 'Source de la vidéo';
        youtubeBtn.textContent = '▶️ Lien YouTube';
        sourceHelp.textContent = 'Uploader = protection maximale (lien temporaire régénéré à chaque visionnage, valable 6h). YouTube non répertorié = gratuit, mais lien plus facilement partageable et sans expiration.';
        externalLabel.textContent = 'Lien de la vidéo YouTube (non répertoriée de préférence)';
        youtubeInput.placeholder = 'https://www.youtube.com/watch?v=...';
      }
    }

    function extractYoutubeId(url) {
      if (!url) return null;
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtube\.com\/embed\/|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/
      ];
      for (const p of patterns) {
        const m = url.match(p);
        if (m) return m[1];
      }
      // Si l'utilisateur a collé directement l'ID (11 caractères)
      if (/^[a-zA-Z0-9_-]{11}$/.test(url.trim())) return url.trim();
      return null;
    }

    document.getElementById('upload-lecon-btn').addEventListener('click', async () => {
      const section = document.getElementById('new-lecon-section').value.trim() || 'Contenu';
      const titre = document.getElementById('new-lecon-titre').value.trim();
      const type = document.getElementById('new-lecon-type').value;
      const progressEl = document.getElementById('upload-progress');
      const errorEl = document.getElementById('upload-error');
      const uploadBtn = document.getElementById('upload-lecon-btn');

      errorEl.classList.add('hidden');

      if (!titre) {
        errorEl.textContent = 'Renseigne un titre.';
        errorEl.classList.remove('hidden');
        return;
      }

      let path = null;
      let youtubeId = null;
      let lienExterne = null;

      if (videoSourceMode === 'youtube') {
        const url = document.getElementById('new-lecon-youtube').value.trim();
        if (!url) {
          errorEl.textContent = 'Colle un lien.';
          errorEl.classList.remove('hidden');
          return;
        }
        if (type === 'video') {
          youtubeId = extractYoutubeId(url);
          if (!youtubeId) {
            errorEl.textContent = "Lien YouTube invalide, vérifie l'URL collée.";
            errorEl.classList.remove('hidden');
            return;
          }
        } else {
          lienExterne = url;
        }
      } else {
        const fileInput = document.getElementById('new-lecon-file');
        const file = fileInput.files[0];
        if (!file) {
          errorEl.textContent = 'Choisis un fichier.';
          errorEl.classList.remove('hidden');
          return;
        }

        uploadBtn.disabled = true;
        progressEl.textContent = 'Upload en cours... (peut prendre du temps pour une vidéo)';

        const safeFileName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
        path = `${currentContentFormationId}/${Date.now()}-${safeFileName}`;

        const { error: uploadError } = await supabaseClient
          .storage
          .from('formations-content')
          .upload(path, file);

        if (uploadError) {
          progressEl.textContent = '';
          errorEl.textContent = "Erreur d'upload : " + uploadError.message;
          errorEl.classList.remove('hidden');
          uploadBtn.disabled = false;
          return;
        }
      }

      uploadBtn.disabled = true;

      // Déterminer l'ordre suivant
      const { data: existing } = await supabaseClient
        .from('formation_contenu')
        .select('ordre')
        .eq('formation_id', currentContentFormationId)
        .order('ordre', { ascending: false })
        .limit(1);

      const nextOrdre = existing && existing[0] ? existing[0].ordre + 1 : 1;

      const { error: insertError } = await supabaseClient
        .from('formation_contenu')
        .insert({
          formation_id: currentContentFormationId,
          titre,
          type,
          section,
          chemin_storage: path,
          youtube_id: youtubeId,
          lien_externe: lienExterne,
          ordre: nextOrdre,
        });

      progressEl.textContent = '';
      uploadBtn.disabled = false;

      if (insertError) {
        errorEl.textContent = "Erreur d'enregistrement : " + insertError.message;
        errorEl.classList.remove('hidden');
        return;
      }

      errorEl.classList.add('hidden');
      document.getElementById('new-lecon-titre').value = '';
      const fileInputReset = document.getElementById('new-lecon-file');
      if (fileInputReset) fileInputReset.value = '';
      const youtubeInputReset = document.getElementById('new-lecon-youtube');
      if (youtubeInputReset) youtubeInputReset.value = '';
      loadContentLecons();
    });

    async function deleteLecon(id, path) {
      if (!confirm('Supprimer définitivement cette leçon (et son fichier éventuel) ?')) return;

      if (path && path !== 'null' && path !== '') {
        await supabaseClient.storage.from('formations-content').remove([path]);
      }
      const { error } = await supabaseClient.from('formation_contenu').delete().eq('id', id);

      if (error) {
        alert('Erreur lors de la suppression : ' + error.message);
        return;
      }
      loadContentLecons();
    }
  </script>
