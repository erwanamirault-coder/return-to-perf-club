<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            black: '#000000', white: '#FFFFFF',

<style>
  body { font-family: 'Poppins', sans-serif; }
  h1, h2, .font-heading { font-family: 'Oswald', sans-serif; }
</style>
</head>
<body class="bg-brand-black text-brand-white min-h-screen">

  <!-- HEADER -->
  <header class="flex items-center justify-between px-6 sm:px-10 py-5 border-b border-white/10">
    <div class="flex items-center gap-3">
      <span class="font-heading uppercase font-bold text-sm tracking-wide">Bilan de tes capacités</span>
    </div>
    <div class="flex items-center gap-4 text-sm">
      <span id="user-name" class="text-white/40"></span>
      <button id="logout-btn" class="underline underline-offset-4 text-white/60 hover:text-white transition-colors">Se déconnecter</button>
    </div>
  </header>

  <!-- Barre de progression -->
  <div class="w-full h-1 bg-white/10">
    <div id="progress-bar" class="h-1 bg-brand-blue transition-all duration-300" style="width: 0%"></div>
  </div>

  <main class="flex flex-col items-center px-6 py-10">
    <div class="w-full max-w-lg">

      <p id="step-label" class="text-xs text-white/40 mb-4"></p>

      <span id="joint-badge" class="inline-block mb-3 px-3 py-1 rounded-full text-[11px] uppercase tracking-widest font-semibold text-brand-blue-light border border-brand-blue-dark"></span>

      <h1 id="test-title" class="font-heading uppercase text-2xl sm:text-3xl font-bold mb-1"></h1>
      <p id="test-type" class="text-xs uppercase tracking-widest text-brand-blue-light font-semibold mb-5"></p>

      <!-- Vidéo -->
      <div class="aspect-[3/4] w-full max-w-xs mx-auto rounded-xl bg-white/5 border border-white/10 flex items-center justify-center mb-5 overflow-hidden">
        <video id="test-video" class="w-full h-full object-cover hidden" controls></video>
        <p id="video-placeholder" class="text-white/40 text-sm px-6 text-center">
          Vidéo de démonstration à venir
        </p>
      </div>

      <p id="instructions" class="text-white/70 text-sm leading-relaxed mb-6"></p>

      <!-- 3 photos de référence -->
      <div class="grid grid-cols-3 gap-2 mb-8" id="reference-images">
        <!-- rempli par JS -->
      </div>

      <!-- Notation gauche / droite -->
      <div class="grid grid-cols-2 gap-4 mb-10">
        <div>
          <p class="text-xs uppercase tracking-widest text-white/50 font-semibold mb-2">Côté gauche</p>
          <div class="flex flex-col gap-2" id="left-buttons">
            <button data-side="left" data-value="1" class="rating-btn px-4 py-2.5 rounded-lg border border-white/15 hover:border-brand-blue transition-colors text-sm text-left">Limité</button>
            <button data-side="left" data-value="2" class="rating-btn px-4 py-2.5 rounded-lg border border-white/15 hover:border-brand-blue transition-colors text-sm text-left">Satisfaisant</button>
            <button data-side="left" data-value="3" class="rating-btn px-4 py-2.5 rounded-lg border border-white/15 hover:border-brand-blue transition-colors text-sm text-left">Excellent</button>
          </div>
        </div>
        <div>
          <p class="text-xs uppercase tracking-widest text-white/50 font-semibold mb-2">Côté droit</p>
          <div class="flex flex-col gap-2" id="right-buttons">
            <button data-side="right" data-value="1" class="rating-btn px-4 py-2.5 rounded-lg border border-white/15 hover:border-brand-blue transition-colors text-sm text-left">Limité</button>
            <button data-side="right" data-value="2" class="rating-btn px-4 py-2.5 rounded-lg border border-white/15 hover:border-brand-blue transition-colors text-sm text-left">Satisfaisant</button>
            <button data-side="right" data-value="3" class="rating-btn px-4 py-2.5 rounded-lg border border-white/15 hover:border-brand-blue transition-colors text-sm text-left">Excellent</button>
          </div>
        </div>
      </div>

      <div class="flex justify-between items-center mb-6">
        <a href="choix-bilan.html" class="text-sm text-white/50 hover:text-white transition-colors underline underline-offset-4">Changer de bilan</a>
        <button id="next-btn" disabled class="px-8 py-3 rounded-lg bg-brand-blue disabled:bg-white/10 disabled:text-white/30 hover:bg-brand-blue-dark transition-colors font-heading uppercase tracking-wide font-semibold text-sm">
          Suivant
        </button>
      </div>

      <p class="text-center text-xs text-white/30">
        Reprendre plus tard — ta progression est déjà enregistrée
      </p>

    </div>
  </main>
