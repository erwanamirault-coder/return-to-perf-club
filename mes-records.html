<!DOCTYPE html>
<html lang="fr">
<head>
<script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes records — Bilan de tes capacités</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            black: '#000000', white: '#FFFFFF',
            blue: { light: '#69A0F2', DEFAULT: '#2D7AED', dark: '#0F4CA9' }
          }
        },
        fontFamily: { heading: ['Oswald', 'sans-serif'], body: ['Poppins', 'sans-serif'] }
      }
    }
  }
</script>
<style>
  body { font-family: 'Poppins', sans-serif; }
  h1, h2, .font-heading { font-family: 'Oswald', sans-serif; }
</style>
</head>
<body class="min-h-screen">

  <header class="flex items-center justify-between px-6 sm:px-10 py-5 border-b border-[color:var(--border)]">
    <span class="font-heading uppercase font-bold text-sm tracking-wide">Bilan de tes capacités</span>
    <div class="flex items-center gap-4 text-sm">
      <a href="dashboard.html" class="text-[color:var(--fg-60)] hover:text-[color:var(--fg)] transition-colors">Mon espace</a>
      <button id="theme-toggle" class="w-9 h-9 rounded-full border border-[color:var(--border-strong)] flex items-center justify-center hover:border-brand-blue transition-colors shrink-0"></button>
    </div>
  </header>

  <main id="page-content" class="px-6 py-12 max-w-2xl mx-auto hidden">
    <h1 class="font-heading uppercase text-2xl font-bold mb-2 text-center">🏆 Mes records</h1>
    <p class="text-sm text-[color:var(--fg-50)] text-center mb-10">Fais défiler et remplis tes records au fur et à mesure. Chaque ligne s'enregistre indépendamment.</p>

    <div id="categories-container" class="flex flex-col gap-10"></div>

  </main>

  <script src="supabase-config.js"></script>
  <script src="theme.js"></script>
  <script>
    const mouvements = {
      "Haltérophilie / Weightlifting": [
        { fr: "Arraché", en: "Snatch" }, { fr: "Arraché suspendu", en: "Hang Snatch" },
        { fr: "Arraché puissance", en: "Power Snatch" }, { fr: "Arraché puissance suspendu", en: "Hang Power Snatch" },
        { fr: "Tirage d'arraché", en: "Snatch Pull" }, { fr: "Épaulé", en: "Clean" },
        { fr: "Épaulé suspendu", en: "Hang Clean" }, { fr: "Épaulé puissance", en: "Power Clean" },
        { fr: "Épaulé puissance suspendu", en: "Hang Power Clean" }, { fr: "Tirage d'épaulé", en: "Clean Pull" },
        { fr: "Jeté", en: "Jerk" }, { fr: "Jeté fente", en: "Split Jerk" }, { fr: "Jeté puissance", en: "Power Jerk" },
        { fr: "Poussée-jeté", en: "Push Jerk" }, { fr: "Épaulé-jeté", en: "Clean & Jerk" },
        { fr: "Squat clavicule", en: "Front Squat" }, { fr: "Squat nuque", en: "Back Squat" }, { fr: "Squat overhead", en: "Overhead Squat" }
      ],
      "Renforcement": [
        { fr: "Squat arrière", en: "Back Squat" }, { fr: "Squat avant", en: "Front Squat" }, { fr: "Squat overhead", en: "Overhead Squat" },
        { fr: "Soulevé de terre", en: "Deadlift" }, { fr: "Soulevé de terre sumo", en: "Sumo Deadlift" },
        { fr: "Développé couché", en: "Bench Press" }, { fr: "Développé militaire strict", en: "Strict Press" },
        { fr: "Développé militaire poussé", en: "Push Press" }, { fr: "Thruster", en: "Thruster" },
        { fr: "Good Morning", en: "Good Morning" }, { fr: "Fentes bulgares", en: "Bulgarian Split Squat" }
      ],
      "Gymnastique": [
        { fr: "Traction stricte", en: "Strict Pull-up" }, { fr: "Traction kipping", en: "Kipping Pull-up" },
        { fr: "Traction papillon", en: "Butterfly Pull-up" }, { fr: "Traction poitrine à la barre", en: "Chest to Bar" },
        { fr: "Muscle-up barre", en: "Bar Muscle-up" }, { fr: "Muscle-up anneaux", en: "Ring Muscle-up" },
        { fr: "Relevé de jambes à la barre", en: "Toes to Bar" }, { fr: "Pompe poirier", en: "Handstand Push-up" },
        { fr: "Marche sur les mains", en: "Handstand Walk" }, { fr: "Poirier (tenue)", en: "Handstand Hold" },
        { fr: "Grimper de corde", en: "Rope Climb" }, { fr: "Squat pistol", en: "Pistol Squat" }, { fr: "Dips aux anneaux", en: "Ring Dips" }
      ],
      "Cardio / Benchmarks": [
        { fr: "Rameur 500m", en: "Row 500m" }, { fr: "Rameur 1000m", en: "Row 1km" }, { fr: "Rameur 2000m", en: "Row 2km" },
        { fr: "Rameur 5000m", en: "Row 5km" }, { fr: "Course 1 mile", en: "Run 1 Mile" }, { fr: "Course 5km", en: "Run 5k" },
        { fr: "Assault Bike (calories)", en: "Assault Bike Calories" }, { fr: "Double-unders max", en: "Max Double-unders" },
        { fr: "Burpees max en 5 min", en: "Max Burpees in 5min" }, { fr: "WOD Fran (temps)", en: "Fran Time" },
        { fr: "WOD Grace (temps)", en: "Grace Time" }, { fr: "WOD Murph (temps)", en: "Murph Time" }, { fr: "WOD Helen (temps)", en: "Helen Time" }
      ]
    };
    const categoriesForce = ["Haltérophilie / Weightlifting", "Renforcement"];

    let currentUserEmail = null;
    let allRecords = [];

    function findRecord(exercice, rm) {
      return allRecords.find(r => r.exercice === exercice && r.repetitions_max === rm);
    }

    function buildPage() {
      const container = document.getElementById('categories-container');
      container.innerHTML = Object.entries(mouvements).map(([cat, list]) => {
        const isForce = categoriesForce.includes(cat);

        return `
          <div>
            <h2 class="font-heading uppercase text-lg font-bold mb-4 text-[color:var(--accent)] tracking-wide">${cat}</h2>
            <div class="rounded-xl border border-[color:var(--border)] divide-y divide-[color:var(--border)]">
              ${list.map(m => {
                const safeId = m.fr.replace(/[^a-zA-Z0-9]/g, '');
                if (isForce) {
                  const r1 = findRecord(m.fr, 1), r3 = findRecord(m.fr, 3), r5 = findRecord(m.fr, 5);
                  return `
                    <div class="px-4 py-3 flex flex-wrap items-center justify-between gap-2" data-exercice="${m.fr}" data-categorie="${cat}" data-force="1">
                      <div class="min-w-[130px]">
                        <p class="text-sm font-medium">${m.fr}</p>
                        <p class="text-xs text-[color:var(--fg-40)]">${m.en}</p>
                      </div>
                      <div class="flex items-center gap-1.5">
                        <div class="text-center">
                          <label class="block text-[9px] uppercase text-[color:var(--fg-40)]">1RM</label>
                          <input type="number" step="0.5" class="rm-input w-14 px-1.5 py-1.5 rounded-md bg-[color:var(--card)] border border-[color:var(--border)] text-xs text-center outline-none focus:border-brand-blue" data-rm="1" value="${r1 ? r1.valeur : ''}">
                        </div>
                        <div class="text-center">
                          <label class="block text-[9px] uppercase text-[color:var(--fg-40)]">3RM</label>
                          <input type="number" step="0.5" class="rm-input w-14 px-1.5 py-1.5 rounded-md bg-[color:var(--card)] border border-[color:var(--border)] text-xs text-center outline-none focus:border-brand-blue" data-rm="3" value="${r3 ? r3.valeur : ''}">
                        </div>
                        <div class="text-center">
                          <label class="block text-[9px] uppercase text-[color:var(--fg-40)]">5RM</label>
                          <input type="number" step="0.5" class="rm-input w-14 px-1.5 py-1.5 rounded-md bg-[color:var(--card)] border border-[color:var(--border)] text-xs text-center outline-none focus:border-brand-blue" data-rm="5" value="${r5 ? r5.valeur : ''}">
                        </div>
                        <button class="save-row-btn w-8 h-8 rounded-md bg-brand-blue hover:bg-brand-blue-dark text-white text-sm flex items-center justify-center shrink-0" title="Enregistrer">✓</button>
                      </div>
                    </div>
                  `;
                } else {
                  const r0 = findRecord(m.fr, 0);
                  return `
                    <div class="px-4 py-3 flex flex-wrap items-center justify-between gap-2" data-exercice="${m.fr}" data-categorie="${cat}" data-force="0">
                      <div class="min-w-[130px]">
                        <p class="text-sm font-medium">${m.fr}</p>
                        <p class="text-xs text-[color:var(--fg-40)]">${m.en}</p>
                      </div>
                      <div class="flex items-center gap-1.5">
                        <input type="number" step="0.5" class="simple-value w-20 px-2 py-1.5 rounded-md bg-[color:var(--card)] border border-[color:var(--border)] text-xs outline-none focus:border-brand-blue" placeholder="Valeur" value="${r0 ? r0.valeur : ''}">
                        <select class="simple-unite px-1.5 py-1.5 rounded-md bg-[color:var(--card)] border border-[color:var(--border)] text-xs outline-none focus:border-brand-blue">
                          <option value="reps" ${r0?.unite === 'reps' ? 'selected' : ''}>reps</option>
                          <option value="sec" ${r0?.unite === 'sec' ? 'selected' : ''}>sec</option>
                          <option value="m" ${r0?.unite === 'm' ? 'selected' : ''}>m</option>
                          <option value="cal" ${r0?.unite === 'cal' ? 'selected' : ''}>cal</option>
                          <option value="kg" ${r0?.unite === 'kg' ? 'selected' : ''}>kg</option>
                        </select>
                        <button class="save-row-btn w-8 h-8 rounded-md bg-brand-blue hover:bg-brand-blue-dark text-white text-sm flex items-center justify-center shrink-0" title="Enregistrer">✓</button>
                      </div>
                    </div>
                  `;
                }
              }).join('')}
            </div>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.save-row-btn').forEach(btn => {
        btn.addEventListener('click', () => saveRow(btn));
      });
    }

    async function saveRow(btn) {
      const row = btn.closest('[data-exercice]');
      const exercice = row.dataset.exercice;
      const categorie = row.dataset.categorie;
      const isForce = row.dataset.force === '1';

      btn.disabled = true;
      const original = btn.textContent;
      btn.textContent = '…';

      if (isForce) {
        const inputs = row.querySelectorAll('.rm-input');
        const entries = Array.from(inputs)
          .map(input => ({ rm: Number(input.dataset.rm), val: input.value }))
          .filter(e => e.val !== '' && !isNaN(parseFloat(e.val)));

        for (const e of entries) {
          await supabaseClient.from('records').upsert({
            client_email: currentUserEmail,
            categorie: categorie,
            exercice: exercice,
            valeur: parseFloat(e.val),
            unite: 'kg',
            repetitions_max: e.rm,
            date_record: new Date().toISOString().split('T')[0],
            updated_at: new Date().toISOString()
          }, { onConflict: 'client_email,exercice,repetitions_max' });
        }
      } else {
        const valeur = parseFloat(row.querySelector('.simple-value').value);
        const unite = row.querySelector('.simple-unite').value;
        if (!isNaN(valeur)) {
          await supabaseClient.from('records').upsert({
            client_email: currentUserEmail,
            categorie: categorie,
            exercice: exercice,
            valeur: valeur,
            unite: unite,
            repetitions_max: 0,
            date_record: new Date().toISOString().split('T')[0],
            updated_at: new Date().toISOString()
          }, { onConflict: 'client_email,exercice,repetitions_max' });
        }
      }

      btn.disabled = false;
      btn.textContent = '✓';
      btn.classList.add('bg-brand-blue-dark');
      setTimeout(() => btn.classList.remove('bg-brand-blue-dark'), 800);

      await loadRecords();
    }

    async function loadRecords() {
      const { data } = await supabaseClient
        .from('records')
        .select('*')
        .eq('client_email', currentUserEmail);
      allRecords = data || [];
      buildPage();
    }

    async function load() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) { window.location.href = 'login.html'; return; }
      currentUserEmail = user.email.trim().toLowerCase();

      document.getElementById('page-content').classList.remove('hidden');
      await loadRecords();
    }

    load();
  </script>

</body>
</html>
