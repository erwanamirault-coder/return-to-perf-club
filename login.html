<!DOCTYPE html>
<html lang="fr">
<head>
<script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Erwan Amirault</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            black: '#000000', white: '#FFFFFF',
            blue: { light: '#69A0F2', DEFAULT: '#2D7AED', dark: '#0F4CA9' }
          }
        },
        fontFamily: { heading: ['Oswald', 'sans-serif'], body: ['Poppins', 'sans-serif'] }
      }
    }
  }
</script>
<style>
  body { font-family: 'Poppins', sans-serif; }
  h1, .font-heading { font-family: 'Oswald', sans-serif; }
</style>
</head>
<body class="min-h-screen flex flex-col">

  <header class="flex items-center justify-between px-6 sm:px-10 py-5">
    <a href="index.html" class="flex items-center gap-2">
      <span class="font-heading uppercase font-bold text-sm tracking-wide">Erwan Amirault</span>
    </a>
    <button id="theme-toggle" class="w-9 h-9 rounded-full border border-[color:var(--border-strong)] flex items-center justify-center hover:border-brand-blue transition-colors shrink-0"></button>
  </header>

  <main class="flex-1 flex flex-col items-center justify-center px-6">
    <div class="w-full max-w-sm">

      <h1 class="font-heading uppercase text-2xl font-bold text-center mb-8">Se connecter</h1>

      <form id="login-form" class="flex flex-col gap-4">
        <input type="email" id="email" placeholder="Adresse email" required
          class="w-full px-4 py-3 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] focus:border-brand-blue outline-none placeholder:text-[color:var(--fg-40)]">
        <div class="relative">
          <input type="password" id="password" placeholder="Mot de passe" required
            class="w-full px-4 py-3 pr-12 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] focus:border-brand-blue outline-none placeholder:text-[color:var(--fg-40)]">
          <button type="button" id="toggle-password-btn" aria-label="Afficher le mot de passe" class="absolute right-3 top-1/2 -translate-y-1/2 text-[color:var(--fg-40)] hover:text-[color:var(--fg)] transition-colors">
            <svg id="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="eye-closed" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>

        <p id="error-msg" class="text-red-400 text-sm hidden"></p>

        <div id="forgot-password-box" class="hidden rounded-lg border border-brand-blue-dark bg-brand-blue/10 px-4 py-3">
          <p class="text-sm text-[color:var(--fg-70)] mb-2">Mot de passe oublié ?</p>
          <button type="button" id="send-reset-btn" class="text-sm text-[color:var(--accent)] underline underline-offset-4 font-medium">
            Recevoir un lien de réinitialisation par e-mail
          </button>
          <p id="reset-sent-msg" class="hidden text-xs text-[color:var(--accent)] font-medium mt-2">
            E-mail envoyé ✓ Vérifie ta boîte de réception.
          </p>
          <p id="reset-error-msg" class="hidden text-xs text-red-400 mt-2"></p>
        </div>

        <button type="submit" id="submit-btn"
          class="mt-2 w-full px-10 py-4 rounded-lg bg-brand-blue hover:bg-brand-blue-dark transition-colors font-heading uppercase tracking-wide font-semibold text-white">
          Se connecter
        </button>
      </form>

      <p class="text-center text-sm text-[color:var(--fg-60)] mt-6">
        Pas encore de compte ? <a href="signup.html" class="text-[color:var(--accent)] underline underline-offset-4">Créer mon compte</a>
      </p>
    </div>
  </main>

  <script src="supabase-config.js"></script>
  <script src="theme.js"></script>
  <script>
    const form = document.getElementById('login-form');

    document.getElementById('toggle-password-btn').addEventListener('click', () => {
      const passwordInput = document.getElementById('password');
      const eyeOpen = document.getElementById('eye-open');
      const eyeClosed = document.getElementById('eye-closed');
      const isHidden = passwordInput.type === 'password';

      passwordInput.type = isHidden ? 'text' : 'password';
      eyeOpen.classList.toggle('hidden', isHidden);
      eyeClosed.classList.toggle('hidden', !isHidden);
    });
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');
    const forgotBox = document.getElementById('forgot-password-box');
    const sendResetBtn = document.getElementById('send-reset-btn');
    const resetSentMsg = document.getElementById('reset-sent-msg');
    const resetErrorMsg = document.getElementById('reset-error-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('hidden');
      forgotBox.classList.add('hidden');
      resetSentMsg.classList.add('hidden');
      resetErrorMsg.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Connexion...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        errorMsg.textContent = "Email ou mot de passe incorrect.";
        errorMsg.classList.remove('hidden');
        forgotBox.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Se connecter';
        return;
      }

      window.location.href = 'dashboard.html';
    });

    sendResetBtn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      resetErrorMsg.classList.add('hidden');
      resetSentMsg.classList.add('hidden');

      if (!email) {
        resetErrorMsg.textContent = "Renseigne d'abord ton adresse e-mail ci-dessus.";
        resetErrorMsg.classList.remove('hidden');
        return;
      }

      sendResetBtn.disabled = true;

      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/changer-mot-de-passe.html',
      });

      sendResetBtn.disabled = false;

      if (error) {
        resetErrorMsg.textContent = "Erreur : " + error.message;
        resetErrorMsg.classList.remove('hidden');
        return;
      }

      resetSentMsg.classList.remove('hidden');
    });
  </script>

</body>
</html>
