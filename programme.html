<!DOCTYPE html>
<html lang="fr">
<head>
<script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon programme — Bilan de tes capacités</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            black: '#000000', white: '#FFFFFF',
            blue: { light: '#69A0F2', DEFAULT: '#2D7AED', dark: '#0F4CA9' }
          }
        },
        fontFamily: { heading: ['Oswald', 'sans-serif'], body: ['Poppins', 'sans-serif'] }
      }
    }
  }
</script>
<style>
  body { font-family: 'Poppins', sans-serif; }
  h1, h2, .font-heading { font-family: 'Oswald', sans-serif; }
</style>
</head>
<body class="min-h-screen">

  <header class="flex items-center justify-between px-6 sm:px-10 py-5 border-b border-[color:var(--border)]">
    <span class="font-heading uppercase font-bold text-sm tracking-wide">Bilan de tes capacités</span>
    <div class="flex items-center gap-4 text-sm">
      <a href="dashboard.html" class="text-[color:var(--fg-60)] hover:text-[color:var(--fg)] transition-colors">Mon espace</a>
      <button id="logout-btn" class="underline underline-offset-4 text-[color:var(--fg-60)] hover:text-[color:var(--fg)] transition-colors">Se déconnecter</button>
      <button id="theme-toggle" class="w-9 h-9 rounded-full border border-[color:var(--border-strong)] flex items-center justify-center hover:border-brand-blue transition-colors shrink-0"></button>
    </div>
  </header>

  <main class="px-6 py-12 max-w-2xl mx-auto">
    <h1 class="font-heading uppercase text-2xl font-bold mb-8 text-center">Ma programmation</h1>

    <!-- Navigation semaine -->
    <div class="flex items-center justify-between mb-5">
      <button id="prev-week" class="w-8 h-8 rounded-full border border-[color:var(--border-strong)] flex items-center justify-center hover:border-brand-blue transition-colors text-sm">‹</button>
      <h2 id="week-label" class="text-xs uppercase tracking-widest text-[color:var(--fg-50)] font-semibold"></h2>
      <button id="next-week" class="w-8 h-8 rounded-full border border-[color:var(--border-strong)] flex items-center justify-center hover:border-brand-blue transition-colors text-sm">›</button>
    </div>

    <!-- Vue semaine discrète -->
    <div id="week-strip" class="grid grid-cols-7 gap-1.5 mb-10"></div>

    <div id="day-detail"></div>

  </main>

  <script src="supabase-config.js"></script>
  <script src="theme.js"></script>
  <script>
    let seancesParDate = {};
    let currentWeekStart = getMonday(new Date());
    let selectedDate = null;

    const weekLabel = document.getElementById('week-label');
    const weekStrip = document.getElementById('week-strip');
    const dayDetail = document.getElementById('day-detail');
    const moisNoms = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
    const joursLettres = ["L","M","M","J","V","S","D"];
    const offsetJour = { "Lundi": 0, "Mardi": 1, "Mercredi": 2, "Jeudi": 3, "Vendredi": 4, "Samedi": 5, "Dimanche": 6 };

    function getMonday(d) {
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      const monday = new Date(d);
      monday.setDate(d.getDate() + diff);
      return monday;
    }

    function formatDateKey(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function calculerDate(s) {
      if (s.date_seance) return s.date_seance;
      if (s.semaine_debut && s.jour && offsetJour[s.jour] !== undefined) {
        const [y, m, d] = s.semaine_debut.split('-').map(Number);
        const lundi = new Date(y, m - 1, d);
        lundi.setDate(lundi.getDate() + offsetJour[s.jour]);
        return formatDateKey(lundi);
      }
      return null;
    }

    function renderWeek() {
      const days = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(currentWeekStart);
        d.setDate(currentWeekStart.getDate() + i);
        days.push(d);
      }

      const first = days[0], last = days[6];
      weekLabel.textContent = first.getMonth() === last.getMonth()
        ? `${first.getDate()} – ${last.getDate()} ${moisNoms[first.getMonth()]} ${first.getFullYear()}`
        : `${first.getDate()} ${moisNoms[first.getMonth()]} – ${last.getDate()} ${moisNoms[last.getMonth()]} ${last.getFullYear()}`;

      const today = formatDateKey(new Date());
      weekStrip.innerHTML = '';

      days.forEach((d, i) => {
        const key = formatDateKey(d);
        const hasSeance = !!seancesParDate[key];
        const isToday = key === today;
        const isSelected = key === selectedDate;

        const btn = document.createElement('button');
        btn.className = `flex flex-col items-center gap-1 py-3 rounded-lg border transition-colors ${
          isToday ? 'bg-brand-blue text-white border-brand-blue' :
          isSelected ? 'border-brand-blue bg-brand-blue/10' :
          'border-[color:var(--border)]'
        } hover:border-brand-blue`;
        btn.innerHTML = `
          <span class="text-[10px] uppercase ${isToday ? 'text-white/70' : 'text-[color:var(--fg-40)]'}">${joursLettres[i]}</span>
          <span class="text-sm font-semibold">${d.getDate()}</span>
          ${hasSeance ? `<span class="w-1 h-1 rounded-full ${isToday ? 'bg-white' : 'bg-brand-blue'}"></span>` : '<span class="w-1 h-1"></span>'}
        `;
        btn.addEventListener('click', () => {
          selectedDate = key;
          renderWeek();
          renderDayDetail();
        });
        weekStrip.appendChild(btn);
      });
    }

    function renderDayDetail() {
      if (!selectedDate) {
        dayDetail.innerHTML = `<p class="text-center text-sm text-[color:var(--fg-40)]">Sélectionne un jour pour voir la séance.</p>`;
        return;
      }

      const exos = seancesParDate[selectedDate];
      const [y, m, d] = selectedDate.split('-').map(Number);
      const dateObj = new Date(y, m - 1, d);
      const dateLabel = dateObj.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

      if (!exos) {
        dayDetail.innerHTML = `
          <h3 class="font-heading uppercase text-base font-bold mb-3 text-[color:var(--accent)]">${dateLabel}</h3>
          <p class="text-sm text-[color:var(--fg-40)]">Pas de séance prévue ce jour-là.</p>
        `;
        return;
      }

      dayDetail.innerHTML = `
        <h3 class="font-heading uppercase text-base font-bold mb-3 text-[color:var(--accent)]">${dateLabel}</h3>
        <div class="rounded-xl border border-[color:var(--border)] overflow-x-auto">
          <table class="w-full text-sm min-w-[500px]">
            <thead>
              <tr class="bg-[color:var(--card)] text-[color:var(--fg-50)] text-xs uppercase tracking-wide">
                <th class="text-left px-4 py-3">Exercice</th>
                <th class="text-left px-4 py-3">Séries</th>
                <th class="text-left px-4 py-3">Répétitions</th>
                <th class="text-left px-4 py-3">Repos</th>
                <th class="text-left px-4 py-3">RPE</th>
                <th class="text-left px-4 py-3">Tempo</th>
              </tr>
            </thead>
            <tbody>
              ${exos.map(e => `
                <tr class="border-t border-[color:var(--border)]">
                  <td class="px-4 py-3 font-medium">
                    ${e.lien_video
                      ? `<a href="${e.lien_video}" target="_blank" class="text-[color:var(--accent)] underline underline-offset-4">${e.exercice}</a>`
                      : e.exercice}
                  </td>
                  <td class="px-4 py-3 text-[color:var(--fg-70)]">${e.series}</td>
                  <td class="px-4 py-3 text-[color:var(--fg-70)]">${e.repetitions}</td>
                  <td class="px-4 py-3 text-[color:var(--fg-70)]">${e.temps_repos || '—'}</td>
                  <td class="px-4 py-3 text-[color:var(--fg-70)]">${e.rpe || '—'}</td>
                  <td class="px-4 py-3 text-[color:var(--fg-70)]">${e.tempo || '—'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    async function load() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) { window.location.href = 'login.html'; return; }

      const { data: seances } = await supabaseClient
        .from('programmes')
        .select('*')
        .order('ordre', { ascending: true });

      seancesParDate = {};
      (seances || []).forEach(s => {
        const key = calculerDate(s);
        if (!key) return;
        if (!seancesParDate[key]) seancesParDate[key] = [];
        seancesParDate[key].push(s);
      });

      const today = formatDateKey(new Date());
      selectedDate = seancesParDate[today] ? today : null;

      renderWeek();
      renderDayDetail();
    }

    document.getElementById('prev-week').addEventListener('click', () => {
      currentWeekStart.setDate(currentWeekStart.getDate() - 7);
      renderWeek();
    });
    document.getElementById('next-week').addEventListener('click', () => {
      currentWeekStart.setDate(currentWeekStart.getDate() + 7);
      renderWeek();
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      window.location.href = 'index.html';
    });

    load();
  </script>

</body>
</html>
