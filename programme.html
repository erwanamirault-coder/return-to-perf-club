<!DOCTYPE html>
<html lang="fr">
<head>
<script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma programmation — Erwan Amirault</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            black: '#000000', white: '#FFFFFF',
            blue: { light: '#69A0F2', DEFAULT: '#2D7AED', dark: '#0F4CA9' }
          }
        },
        fontFamily: { heading: ['Oswald', 'sans-serif'], body: ['Poppins', 'sans-serif'] }
      }
    }
  }
</script>
<style>
  body { font-family: 'Poppins', sans-serif; }
  h1, h2, .font-heading { font-family: 'Oswald', sans-serif; }
</style>
</head>
<body class="min-h-screen">

  <header class="sticky top-0 z-50 bg-[color:var(--bg)] flex items-center justify-between px-6 sm:px-10 py-5 border-b border-[color:var(--border)]">
    <a href="index.html" class="flex items-center gap-2">
      <span class="font-heading uppercase font-bold text-sm tracking-wide">Erwan Amirault</span>
    </a>
    <div class="flex items-center gap-4 text-sm">
      <a href="index.html" class="text-[color:var(--fg-60)] hover:text-[color:var(--fg)] transition-colors">Accueil</a>
      <a href="dashboard.html" class="text-[color:var(--fg-60)] hover:text-[color:var(--fg)] transition-colors">Mon espace</a>
      <button id="theme-toggle" class="w-9 h-9 rounded-full border border-[color:var(--border-strong)] flex items-center justify-center hover:border-brand-blue transition-colors shrink-0"></button>
      <a href="a-propos.html" class="shrink-0"></a>
    </div>
  </header>

  <main class="px-6 py-10 max-w-2xl mx-auto">
    <h1 class="font-heading uppercase text-xl font-bold mb-6 text-center">🗓️ Ma programmation</h1>

    <div class="flex items-center justify-between mb-2">
      <button id="prev-week-btn" class="w-8 h-8 rounded-full border border-[color:var(--border-strong)] flex items-center justify-center hover:border-brand-blue transition-colors text-sm">‹</button>
      <input type="date" id="week-picker" class="px-4 py-2 rounded-lg bg-[color:var(--card)] border border-[color:var(--border)] focus:border-brand-blue outline-none text-sm">
      <button id="next-week-btn" class="w-8 h-8 rounded-full border border-[color:var(--border-strong)] flex items-center justify-center hover:border-brand-blue transition-colors text-sm">›</button>
    </div>
    <p id="week-info" class="text-sm text-[color:var(--fg-50)] mb-8 text-center"></p>

    <div id="days-container" class="flex flex-col gap-4"></div>
  </main>

  <script src="supabase-config.js"></script>
  <script src="theme.js"></script>
  <script>
    const jours = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];
    let currentUserEmail = null;
    let currentMonday = null;

    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function formatDateKey(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function getMondayFromDateStr(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      const day = date.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      date.setDate(date.getDate() + diff);
      return date;
    }

    function setWeek(mondayDate) {
      currentMonday = mondayDate;
      document.getElementById('week-picker').value = formatDateKey(currentMonday);
      const sunday = new Date(currentMonday);
      sunday.setDate(currentMonday.getDate() + 6);
      document.getElementById('week-info').textContent = `Semaine du ${currentMonday.toLocaleDateString('fr-FR')} au ${sunday.toLocaleDateString('fr-FR')}`;
      buildDaysUI();
      loadWeek();
    }

    function buildDaysUI() {
      const container = document.getElementById('days-container');
      container.innerHTML = jours.map((jour, i) => {
        const d = new Date(currentMonday);
        d.setDate(currentMonday.getDate() + i);
        const dateLabel = d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
        return `
          <div class="rounded-xl border border-[color:var(--border)] p-4" data-jour="${jour}">
            <h3 class="font-heading uppercase font-bold text-sm mb-3">${jour} <span class="text-[color:var(--fg-40)] font-normal normal-case">— ${dateLabel}</span></h3>
            <p class="jour-commentaire hidden text-sm text-[color:var(--fg-60)] italic mb-3"></p>
            <div class="exo-list flex flex-col gap-2"></div>
            <p class="jour-empty hidden text-sm text-[color:var(--fg-40)] py-2">Repos / pas de séance programmée.</p>
          </div>
        `;
      }).join('');
    }

    async function loadWeek() {
      const { data: exos } = await supabaseClient
        .from('programmes').select('*')
        .eq('client_email', currentUserEmail).eq('semaine_debut', formatDateKey(currentMonday))
        .order('ordre', { ascending: true });

      const { data: notes } = await supabaseClient
        .from('notes_jour').select('*')
        .eq('client_email', currentUserEmail).eq('semaine_debut', formatDateKey(currentMonday));

      jours.forEach(jour => {
        const card = document.querySelector(`[data-jour="${jour}"]`);
        if (!card) return;
        const list = card.querySelector('.exo-list');
        const emptyMsg = card.querySelector('.jour-empty');
        const commentEl = card.querySelector('.jour-commentaire');

        const note = (notes || []).find(n => n.jour === jour);
        if (note && note.commentaire) {
          commentEl.textContent = note.commentaire;
          commentEl.classList.remove('hidden');
        } else {
          commentEl.classList.add('hidden');
        }

        const exosJour = (exos || []).filter(e => e.jour === jour);
        if (exosJour.length === 0) {
          list.innerHTML = '';
          emptyMsg.classList.remove('hidden');
          return;
        }
        emptyMsg.classList.add('hidden');

        list.innerHTML = exosJour.map(exo => `
          <div class="rounded-lg bg-[color:var(--card)] px-3 py-2.5">
            <p class="text-sm font-medium">${escapeHtml(exo.exercice)}</p>
            <p class="text-xs text-[color:var(--fg-50)] mt-0.5">
              ${escapeHtml(exo.series)}x${escapeHtml(exo.repetitions)}${(exo.charge !== null && exo.charge !== undefined) ? ` · ${escapeHtml(exo.charge)}kg` : ''}${exo.temps_repos ? ` · repos ${escapeHtml(exo.temps_repos)}` : ''}${exo.rpe ? ` · RPE ${escapeHtml(exo.rpe)}` : ''}${exo.tempo ? ` · tempo ${escapeHtml(exo.tempo)}` : ''}
            </p>
            ${exo.description ? `<p class="text-xs text-[color:var(--fg-40)] mt-1 italic">${escapeHtml(exo.description)}</p>` : ''}
            ${exo.lien_video ? `<a href="${escapeHtml(exo.lien_video)}" target="_blank" rel="noopener noreferrer" class="text-xs text-brand-blue underline underline-offset-2 mt-1 inline-block">🎦 Voir la vidéo</a>` : ''}
          </div>
        `).join('');
      });
    }

    document.getElementById('prev-week-btn').addEventListener('click', () => {
      const d = new Date(currentMonday); d.setDate(d.getDate() - 7); setWeek(d);
    });
    document.getElementById('next-week-btn').addEventListener('click', () => {
      const d = new Date(currentMonday); d.setDate(d.getDate() + 7); setWeek(d);
    });
    document.getElementById('week-picker').addEventListener('change', () => {
      if (document.getElementById('week-picker').value) setWeek(getMondayFromDateStr(document.getElementById('week-picker').value));
    });

    async function load() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) { window.location.href = 'login.html'; return; }
      currentUserEmail = user.email.trim().toLowerCase();
      setWeek(getMondayFromDateStr(formatDateKey(new Date())));
    }

    load();
  </script>

</body>
</html>
