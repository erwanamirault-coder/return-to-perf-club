  <p id="welcome-msg" class="text-xs uppercase tracking-widest text-brand-blue-light mb-3 font-semibold"></p>
  <h1 class="font-heading uppercase text-2xl font-bold mb-10">Que veux-tu faire ?</h1>

  <div class="w-full max-w-sm flex flex-col gap-4">
    <a href="choix-bilan.html" class="block w-full px-8 py-5 rounded-xl border border-white/15 hover:border-brand-blue transition-colors text-left">
      <span class="block font-heading uppercase font-semibold mb-1">Faire mon bilan</span>
      <span class="block text-sm text-white/50">Évalue tes 5 articulations en moins de 10 min</span>
    </a>

    <a href="programme.html" class="block w-full px-8 py-5 rounded-xl border border-white/15 hover:border-brand-blue transition-colors text-left">
      <span class="block font-heading uppercase font-semibold mb-1">Ma programmation</span>
      <span class="block text-sm text-white/50">Accède à tes séances d'entraînement</span>
    </a>
  </div>

  <button id="logout-btn" class="mt-10 text-xs text-white/40 hover:text-white/70 transition-colors">
    Se déconnecter
  </button>

  <script src="supabase-config.js"></script>
  <script>
    async function load() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) { window.location.href = 'login.html'; return; }
      const firstName = user.user_metadata?.full_name || 'toi';
      document.getElementById('welcome-msg').textContent = `Bon retour, ${firstName}`;
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      window.location.href = 'index.html';
    });

    load();
  </script>
